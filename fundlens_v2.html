.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.5px;font-family:'JetBrains Mono',monospace}
.t1{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.t2{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.t3{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.t4{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

.pbar-wrap{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden}

// ═══════════════════════════════════════════════════════════════

  h:{get(table,params=''){return fetch(`/api/supabase/${table}${params}`).then(r=>r.ok?r.json():null).catch(()=>null)},
     post(table,body,prefer='return=representation'){return fetch(`/api/supabase/${table}`,{method:'POST',headers:{'Content-Type':'application/json','Prefer':prefer},body:JSON.stringify(body)}).then(r=>r.ok?r.json():null).catch(()=>null)},

// ═══════════════════════════════════════════════════════════════
// EDGAR HOLDINGS FETCH (unchanged from v2)
// ═══════════════════════════════════════════════════════════════
async function fetchEdgarHoldings(ticker,fundName){
  try{
    const query=encodeURIComponent(`"${ticker}" OR "${fundName.split(' ').slice(0,3).join(' ')}"`);
    const res=await fetch(`/api/efts/LATEST/search-index?q=${query}&forms=NPORT-P`,{signal:AbortSignal.timeout(12000)});
    if(!res.ok)return null;
    const data=await res.json();
    const hits=data?.hits?.hits;
    if(!hits?.length)return null;
    const src=hits[0]._source;
    const rawCik=src.ciks?.[0];
    if(!rawCik)return null;
    const cik=rawCik.replace(/^0+/,'');
    const padded=rawCik.padStart(10,'0');
    const subRes=await fetch(`/api/edgar/submissions/CIK${padded}.json`,{signal:AbortSignal.timeout(12000)});
    if(!subRes.ok){const adsh=src.adsh;if(!adsh)return null;return await fetchNportByAccession(cik,adsh,ticker)}
    const subData=await subRes.json();
    const filings=subData.filings?.recent;
    if(!filings?.form)return null;
    let latestIdx=-1;
    filings.form.forEach((form,i)=>{if(form==='NPORT-P'){if(latestIdx===-1||filings.filingDate[i]>filings.filingDate[latestIdx])latestIdx=i}});
    if(latestIdx===-1)return null;
    const accNo=filings.accessionNumber[latestIdx];
    return await fetchNportByAccession(cik,accNo,ticker);
  }catch(e){console.warn(`EDGAR search failed for ${ticker}:`,e.message);return null}
}
async function fetchNportByAccession(cik,accNo,ticker){
  try{
    const accNoDashes=accNo.replace(/-/g,'');
    const indexUrl=`/api/www4sec/Archives/edgar/data/${cik}/${accNoDashes}/`;
    const idxRes=await fetch(indexUrl,{signal:AbortSignal.timeout(10000)});
    if(!idxRes.ok)return null;
    const idxHtml=await idxRes.text();
    const xmlMatch=idxHtml.match(/href="([^"]+\.xml)"/i);
    if(!xmlMatch)return null;
    const xmlFile=xmlMatch[1].startsWith('/')?`/api/www4sec${xmlMatch[1]}`:`${indexUrl}${xmlMatch[1]}`;
    const xmlRes=await fetch(xmlFile,{signal:AbortSignal.timeout(20000)});
    if(!xmlRes.ok)return null;
    return parseNportXML(await xmlRes.text(),ticker);
  }catch(e){return null}
}
function parseNportXML(xmlText){
  try{
    const doc=new DOMParser().parseFromString(xmlText,'application/xml');
    const holdings=[];
    doc.querySelectorAll('invstOrSec').forEach(el=>{
      const get=tag=>el.querySelector(tag)?.textContent?.trim()||'';
      const pctVal=parseFloat(get('pctVal'))||0;
      if(pctVal<=0)return;
      const tickerEl=el.querySelector('identifiers ticker value')||el.querySelector('ticker value');
      holdings.push({name:get('name'),ticker:tickerEl?tickerEl.textContent.trim():'',cusip:get('cusip'),pctVal,valUSD:parseFloat(get('valUSD'))||0,assetCat:get('assetCat'),country:get('invCountry'),sector:''});
    });
    holdings.sort((a,b)=>b.pctVal-a.pctVal);
    const rawTotal=holdings.reduce((s,h)=>s+h.pctVal,0);
    if(rawTotal>110)holdings.forEach(h=>{h.pctVal=+(h.pctVal/rawTotal*100).toFixed(4)});
    return holdings.length?holdings:null;
  }catch(e){return null}
}

// ═══════════════════════════════════════════════════════════════
// TIINGO — NAV + Momentum + Sharpe
// ═══════════════════════════════════════════════════════════════
async function fetchTiingo(ticker){
  const end=new Date();
  const start=new Date();start.setFullYear(start.getFullYear()-1);
  const fmt=d=>d.toISOString().split('T')[0];
  try{
    const r=await fetch(`/api/tiingo/tiingo/daily/${ticker}/prices?startDate=${fmt(start)}&endDate=${fmt(end)}`,{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return null;
    const data=await r.json();
    if(!Array.isArray(data)||data.length<20)return null;
    const prices=data.map(d=>d.adjClose||d.close).filter(Boolean);
    const latest=prices[prices.length-1];
    const p63=prices[Math.max(0,prices.length-64)];
    const p21=prices[Math.max(0,prices.length-22)];
    const mom63=((latest-p63)/p63)*100;
    const mom21=((latest-p21)/p21)*100;
    const momentum=Math.min(10,Math.max(0,5+mom63*0.35+mom21*0.15));
    const rets=[];
    for(let i=1;i<prices.length;i++)rets.push((prices[i]-prices[i-1])/prices[i-1]);
    const mean=rets.reduce((s,r)=>s+r,0)/rets.length*252;
    const variance=rets.reduce((s,r)=>s+Math.pow(r-mean/252,2),0)/rets.length;
    const std=Math.sqrt(variance)*Math.sqrt(252);
    const sharpe=std>0?(mean-0.043)/std:0;
    const riskAdj=Math.min(10,Math.max(0,5+sharpe*1.8));
    return{momentum:+momentum.toFixed(2),riskAdj:+riskAdj.toFixed(2),nav:latest,mom63:+mom63.toFixed(2),mom21:+mom21.toFixed(2)};
  }catch(e){return null}
}

// Fetch sector ETF momentum for all 11 GICS sectors
async function fetchSectorMomentum(){
  const results={};
  const etfs=Object.entries(GICS_SECTORS).map(([sector,d])=>({sector,etf:d.etf}));

}

async function fetchFREDSeries(seriesId){
  try{
    const r=await fetch(`/api/fred/series/observations?series_id=${seriesId}&sort_order=desc&limit=5`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return null;
    const data=await r.json();
    const obs=data?.observations?.filter(o=>o.value!=='.');
    return obs?.length?parseFloat(obs[0].value):null;
  }catch(e){return null}
}

async function fetchGDELT(query,maxRecords=8){
  try{
    const q=encodeURIComponent(query);
    const r=await fetch(`/api/gdelt?query=${q}&mode=artlist&maxrecords=${maxRecords}&format=json`,{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return[];
    const data=await r.json();
    return(data?.articles||[]).map(a=>a.title||a.url||'').filter(Boolean).slice(0,maxRecords);
  }catch(e){return[]}
}

async function mapTickerToSector(ticker, companyName){
  if(!ticker)return null;
  
  // Check in-memory cache
  if(APP.sectorMappingCache[ticker])return APP.sectorMappingCache[ticker];
  
  // Check Supabase cache (90-day TTL)
  const cached=await supa.getSectorMapping(ticker);
  if(cached){
    const age=(Date.now()-new Date(cached.cached_at).getTime())/86400000;
    if(age<90){APP.sectorMappingCache[ticker]=cached.sector;return cached.sector}
  }
  
  // Try FMP API
  try{
    const r=await fetch(`/api/fmp/api/v3/profile/${ticker}`,{signal:AbortSignal.timeout(6000)});
    if(r.ok){
      const data=await r.json();
      const sector=data?.[0]?.sector||null;
      const industry=data?.[0]?.industry||null;
      if(sector){
        // Normalize FMP sector names to GICS
        const normalized=normalizeSectorName(sector);
        APP.sectorMappingCache[ticker]=normalized;
        await supa.saveSectorMapping(ticker,normalized,industry);
        return normalized;
      }
    }
  }catch(e){/* FMP unavailable */}
  
  return null; // Will be handled by Claude batch classification below
}

    'Healthcare':'Healthcare','Consumer Cyclical':'Consumer Discretionary',
    'Consumer Defensive':'Consumer Staples','Basic Materials':'Materials',
    'Communication Services':'Communication Services','Energy':'Energy',
    'Industrials':'Industrials','Utilities':'Utilities','Real Estate':'Real Estate',
  };
  return map[fmpSector]||fmpSector;
}

// ═══════════════════════════════════════════════════════════════
// HOLDINGS-LEVEL SCORING + FUND ROLLUP
// ═══════════════════════════════════════════════════════════════
async function scoreHoldingsAndRollup(fundsWithHoldings, sectorScores, tiingoData, sectorMomentum, weights){
  const W=weights||DEFAULT_WEIGHTS;
  const results=[];
  
  // Step A: Map all holdings to sectors (batch FMP + Claude fallback)
  const allHoldings=[];
  fundsWithHoldings.forEach(f=>{
    (f.holdings||[]).forEach(h=>{if(h.ticker&&!APP.sectorMappingCache[h.ticker])allHoldings.push(h)});
  });
  
  // Try FMP for unmapped tickers (batched to respect 250/day limit)
  const unmapped=allHoldings.filter(h=>!APP.sectorMappingCache[h.ticker]).slice(0,60);
  for(const h of unmapped){
    await mapTickerToSector(h.ticker,h.name);
    await sleep(100);
  }
  
  // Claude fallback for still-unmapped
  const stillUnmapped=allHoldings.filter(h=>!APP.sectorMappingCache[h.ticker]);
  if(stillUnmapped.length){
    const clsResult=await classifyUnknownSectors(stillUnmapped);
    Object.entries(clsResult).forEach(([key,sector])=>{
      APP.sectorMappingCache[key]=sector;
    });
  }
  
  // Step B: Score each fund via holdings rollup
  for(const fund of fundsWithHoldings){
    const holdings=fund.holdings||[];
    const tiingo=tiingoData[fund.ticker]||null;
    
    if(!holdings.length){
      // No holdings — fall back to seed + Tiingo
      const seed=SEED[fund.ticker]||{composite:5,roi:0};
      results.push({
        ticker:fund.ticker,name:fund.name,
        composite:seed.composite,roi:seed.roi,
        momentum:tiingo?.momentum||5,riskAdj:tiingo?.riskAdj||5,
        nav:tiingo?.nav||null,
        sectorBreakdown:{},sectorScore:5,worldThesisScore:5,
        alert:ALERTS[fund.ticker]||null,holdings:null,
        tier:classifyTier([seed.composite],[seed.composite]).find(t=>true)||getTierLabel(5),
        modZ:0,
      });
      continue;
    }
    
    // Map holdings to sectors and compute sector exposure
    const sectorExposure={};
    let totalMapped=0;
    holdings.forEach(h=>{
      const sector=APP.sectorMappingCache[h.ticker]||APP.sectorMappingCache[h.name]||h.sector||null;
      if(sector&&GICS_SECTORS[sector]){
        sectorExposure[sector]=(sectorExposure[sector]||0)+h.pctVal;
        totalMapped+=h.pctVal;
      }
    });
    
    // Compute world-thesis-weighted score for this fund
    let worldThesisScore=5.0;
    if(totalMapped>5&&sectorScores){
      let weightedSectorScore=0;
      let totalWeight=0;
      Object.entries(sectorExposure).forEach(([sector,pct])=>{
        const ss=sectorScores[sector];
        if(ss){weightedSectorScore+=ss.score*(pct/100);totalWeight+=pct/100}
      });
      // Fill unmapped portion with neutral 5.0
      const unmappedFraction=Math.max(0,(100-totalMapped)/100);
      worldThesisScore=totalWeight>0?(weightedSectorScore+5.0*unmappedFraction)/(totalWeight+unmappedFraction):5.0;
    }
    
    // HHI concentration penalty
    const hhi=Object.values(sectorExposure).reduce((s,v)=>s+(v/100)*(v/100),0);
    const concentrationPenalty=Math.max(0,(hhi-0.18)*1.5);
    
    // Individual holding momentum (top 5 by weight)
    const topHoldings=holdings.slice(0,8);
    let holdingMomentumSum=0, holdingMomentumCount=0;
    for(const h of topHoldings){
      if(h.ticker){
        const hd=await fetchTiingo(h.ticker).catch(()=>null);
        if(hd?.momentum){holdingMomentumSum+=hd.momentum*(h.pctVal/100);holdingMomentumCount+=h.pctVal/100}
        await sleep(100);
      }
    }
    const holdingMomentum=holdingMomentumCount>0?holdingMomentumSum/holdingMomentumCount:(tiingo?.momentum||5);
    
    // Tiingo-based scores for the fund itself
    const fundMomentum=tiingo?.momentum||5;
    const riskAdj=tiingo?.riskAdj||5;
    
    // Blend momentum: 50% fund-level, 50% top-holdings
    const blendedMomentum=(fundMomentum*0.5+holdingMomentum*0.5);
    
    // Predict ROI: world thesis score → % return estimate
    const roi=predictROI(worldThesisScore,blendedMomentum,riskAdj);
    
    // Composite score
    const composite=Math.min(10,Math.max(1,
      worldThesisScore*(W.worldThesis/100)+
      blendedMomentum*(W.momentum/100)+
      riskAdj*(W.riskAdj/100)+
      5.0*(W.managerQuality/100)+  // placeholder; manager scored by Claude in thesis step
      normalizeROI(roi,results)*(W.returnScore/100)
    )-concentrationPenalty);
    
    results.push({
      ticker:fund.ticker,name:fund.name,
      composite:+composite.toFixed(2),roi:+roi.toFixed(2),
      worldThesisScore:+worldThesisScore.toFixed(2),
      momentum:+blendedMomentum.toFixed(2),riskAdj:+riskAdj.toFixed(2),
      nav:tiingo?.nav||null,
      sectorBreakdown:sectorExposure,sectorScore:+worldThesisScore.toFixed(2),
      alert:ALERTS[fund.ticker]||null,
      holdings:fund.holdings,
      modZ:0,tier:null, // will be set by statistical analysis
    });
  }
  
  // Normalize returnScore now that we have all ROIs
  const rois=results.map(f=>f.roi);
  const mn=Math.min(...rois),mx=Math.max(...rois);
  const W2=weights||DEFAULT_WEIGHTS;
  results.forEach(f=>{
    const rs=mx===mn?5:((f.roi-mn)/(mx-mn))*10;
    f.returnScore=+rs.toFixed(2);
    f.composite=+Math.min(10,Math.max(1,
      f.worldThesisScore*(W2.worldThesis/100)+
      f.momentum*(W2.momentum/100)+
      f.riskAdj*(W2.riskAdj/100)+
      5.0*(W2.managerQuality/100)+
      rs*(W2.returnScore/100)
    )).toFixed(2);
  });
  
  return results;
}

function predictROI(worldScore,momentum,riskAdj){
  // World thesis score maps to ROI: score 10=+8%, score 5=0%, score 1=-6%
  const thesisROI=(worldScore-5)*1.6;
  const momentumROI=(momentum-5)*0.8;
  const riskROI=(riskAdj-5)*0.4;
  return+(thesisROI*0.55+momentumROI*0.30+riskROI*0.15).toFixed(2);
}

function normalizeROI(roi,allFunds){
  const rois=allFunds.map(f=>f.roi);
  if(!rois.length)return 5;
  const mn=Math.min(...rois,roi),mx=Math.max(...rois,roi);
  return mx===mn?5:((roi-mn)/(mx-mn))*10;
}

// ═══════════════════════════════════════════════════════════════
// STATISTICAL OUTLIER DETECTION — Modified Z-Score
// ═══════════════════════════════════════════════════════════════
function applyStatisticalAnalysis(funds){
  const scores=funds.map(f=>f.composite);
  
  // Median
  const sorted=[...scores].sort((a,b)=>a-b);
  const n=sorted.length;
  const median=n%2===0?(sorted[n/2-1]+sorted[n/2])/2:sorted[Math.floor(n/2)];
  
  // MAD (Median Absolute Deviation)
  const deviations=scores.map(s=>Math.abs(s-median));
  const devSorted=[...deviations].sort((a,b)=>a-b);
  const mad=n%2===0?(devSorted[n/2-1]+devSorted[n/2])/2:devSorted[Math.floor(n/2)];
  
  return funds.map(f=>{
    const modZ=mad>0?+(0.6745*(f.composite-median)/mad).toFixed(3):0;
    const tier=getTierFromModZ(modZ);
    return{...f,modZ,tier,median,mad};
  }).sort((a,b)=>b.composite-a.composite);
}

function getTierFromModZ(modZ){
  if(modZ>=2.0) return{label:'BREAKAWAY',cls:'t1',emoji:'🏆',color:'var(--green)',desc:'Statistically exceptional — significantly above peer group'};
  if(modZ>=1.2) return{label:'STRONG',cls:'t1',emoji:'⭐',color:'var(--green)',desc:'Strong performer — meaningfully above average'};
  if(modZ>=0.3) return{label:'SOLID',cls:'t2',emoji:'✓',color:'var(--amber)',desc:'Above average — solid choice for current environment'};
  if(modZ>=-0.5)return{label:'NEUTRAL',cls:'t3',emoji:'→',color:'var(--blue)',desc:'In line with peer average'};
  return{label:'WEAK',cls:'t4',emoji:'⚠',color:'var(--red)',desc:'Below average for current conditions'};
}

function getTierLabel(score){return getTierFromModZ(score>=7?2:score>=5?0.5:score>=3?-0.3:-1)}

// ═══════════════════════════════════════════════════════════════
// ALLOCATION ENGINE — Risk tolerance aware (1–9 scale)
// ═══════════════════════════════════════════════════════════════
function buildAllocation(rankedFunds, riskTolerance){
  const rt=riskTolerance||5;
  
  // Risk tolerance controls:
  // 1-2: Only SOLID+ tier, max volatility cutoff, spread across ≥6 funds
  // 3-4: SOLID+ tier, moderate concentration, ≥4 funds
  // 5:   Balanced — SOLID+ tier, ≤5 funds
  // 6-7: STRONG+ preferred, some concentration allowed
  // 8-9: BREAKAWAY+STRONG focused, concentrate in top outliers, risk-tolerant

  const eligible=rankedFunds.filter(f=>{
    if(rt<=3)return f.modZ>=-0.3&&f.riskAdj>=4.5; // conservative: require decent Sharpe
    if(rt<=5)return f.modZ>=0.1;                   // moderate: above median
    if(rt<=7)return f.modZ>=0.3||f.composite>=6;   // leaning aggressive
    return f.modZ>=0.5||f.composite>=5.5;           // aggressive: any strong+ fund
  });
  
  if(!eligible.length)return[];
  
  // How many funds to include
  let maxFunds;
  if(rt<=2) maxFunds=Math.min(8,eligible.length);
  else if(rt<=4) maxFunds=Math.min(6,eligible.length);
  else if(rt<=6) maxFunds=Math.min(5,eligible.length);
  else maxFunds=Math.min(3,eligible.length); // concentrate in top picks
  
  const selected=eligible.slice(0,maxFunds);
  
  // Allocation proportional to composite score, with risk-tolerance skew
  // Higher risk = more concentration toward top funds
  const concentrationPower=0.5+rt*0.15; // rt=1 → pow=0.65 (even), rt=9 → pow=1.85 (concentrated)
  const rawAllocs=selected.map(f=>Math.pow(f.composite,concentrationPower));
  const total=rawAllocs.reduce((s,v)=>s+v,0);
  
  return selected.map((f,i)=>({
    ...f,
    allocationPct:+(rawAllocs[i]/total*100).toFixed(1),
  }));
}

// ═══════════════════════════════════════════════════════════════
// THESIS GENERATOR — Plain English investment narrative
// ═══════════════════════════════════════════════════════════════
async function generateInvestorThesis(rankedFunds, sectorScores, investmentThesis, allocationResult, riskTolerance){
  const rt=riskTolerance||5;
  const rtLabel=rt<=2?'very conservative':rt<=4?'conservative-moderate':rt<=6?'balanced':rt<=7?'growth-oriented':'aggressive';
  
  const topFunds=allocationResult.slice(0,5).map(f=>`${f.ticker} (${f.allocationPct}%): ${f.name} — composite ${f.composite}, pred ROI ${f.roi>0?'+':''}${f.roi}%`).join('\n');
  const avoidFunds=rankedFunds.filter(f=>f.tier.label==='WEAK').map(f=>f.ticker).join(', ')||'none';
  
  const sectorWinners=Object.entries(sectorScores||{}).filter(([,v])=>v.score>=7).map(([k,v])=>`${k} (${v.score}/10): ${v.reason}`).join('\n')||'No strong sector winners identified';
  const sectorLosers=Object.entries(sectorScores||{}).filter(([,v])=>v.score<=4).map(([k,v])=>`${k} (${v.score}/10): ${v.reason}`).join('\n')||'No major sector losers identified';
  
  const prompt=`You are writing a plain-English investment recommendation for a self-directed 401K investor with a ${rtLabel} risk profile (${rt}/9).

CURRENT INVESTMENT THESIS:
${investmentThesis?.thesis||'Market conditions uncertain — see sector scores'}

DOMINANT THEME: ${investmentThesis?.dominantTheme||'Mixed signals'}

RECOMMENDED ALLOCATION:
${topFunds}

FUNDS TO AVOID: ${avoidFunds}

SECTOR WINNERS (score ≥7/10):
${sectorWinners}

SECTOR LOSERS (score ≤4/10):
${sectorLosers}

RISK FACTORS: ${(investmentThesis?.riskFactors||[]).join(', ')}
CATALYSTS: ${(investmentThesis?.catalysts||[]).join(', ')}

Write a 400-word investor letter in plain English. The tone should match the risk profile: ${rtLabel}. 
Structure: (1) What's happening in the world right now that matters for this portfolio, (2) Why these specific funds are recommended — what do the companies inside them DO that positions them well, (3) What to watch out for, (4) Clear statement of the recommendation.
Use "you" and "your portfolio". Short sentences. No jargon without explanation. Readable grade 7-8.
Return ONLY the letter text, no JSON.`;

  try{
    const res=await fetch('/api/claude',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':'','anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:700,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok)return null;
    const data=await res.json();
    return(data.content||[]).find(b=>b.type==='text')?.text||null;
  }catch(e){return null}
}

// ═══════════════════════════════════════════════════════════════
async function storePredictions(rankedFunds, worldData, investmentThesis, allocationResult){
  const prof=activeProfile();
  if(!prof)return null;
  
  const cycleId=crypto.randomUUID?crypto.randomUUID():`cycle_${Date.now()}`;
  const now=new Date().toISOString();
  const closesAt=new Date(Date.now()+90*86400000).toISOString();
  
  // Save prediction cycle
  await supa.savePredictionCycle({
    id:cycleId,
    user_id:prof.id,
    created_at:now,
    closes_at:closesAt,
    world_snapshot:JSON.stringify({fredData:worldData?.fredData,headlines:worldData?.headlines?.slice(0,10)}),
    investment_thesis:investmentThesis?.thesis||null,
    dominant_theme:investmentThesis?.dominantTheme||null,
    risk_factors:investmentThesis?.riskFactors||[],
    catalysts:investmentThesis?.catalysts||[],
    sector_scores:JSON.stringify(APP.sectorScores||{}),
    risk_tolerance:prof.risk||5,
  });
  
  // Save individual fund predictions
  const predictions=rankedFunds.map(f=>({
    cycle_id:cycleId,
    fund_ticker:f.ticker,
    predicted_composite:f.composite,
    predicted_roi:f.roi,
    predicted_tier:f.tier?.label||'NEUTRAL',
    predicted_rank:rankedFunds.indexOf(f)+1,
    nav_at_prediction:f.nav||null,
    nav_at_close:null,
    actual_roi:null,
    sector_breakdown:JSON.stringify(f.sectorBreakdown||{}),
    allocation_pct:allocationResult.find(a=>a.ticker===f.ticker)?.allocationPct||0,
    created_at:now,
  }));
  await supa.saveFundPredictions(predictions);
  
  return cycleId;
}

// Check for prediction cycles that have closed (>90 days) and fetch actual prices
async function checkAndUpdateClosedPredictions(){
  const prof=activeProfile();
  if(!prof)return;
  
  try{
    const cycles=await supa.getPredictionCycles(prof.id,20);
    if(!cycles?.length)return;
    
    const now=Date.now();
    for(const cycle of cycles){
      const closesAt=new Date(cycle.closes_at).getTime();
      if(closesAt>now)continue; // not closed yet
      
      // Get predictions for this cycle
      const preds=await supa.getFundPredictions(cycle.id);
      if(!preds?.length)continue;
      
      const needsActual=preds.filter(p=>p.actual_roi===null&&p.nav_at_prediction!==null);
      if(!needsActual.length)continue;
      
      // Fetch current NAV for each fund
      for(const pred of needsActual.slice(0,5)){
        const d=await fetchTiingo(pred.fund_ticker);
        if(d?.nav&&pred.nav_at_prediction){
          const actualRoi=((d.nav-pred.nav_at_prediction)/pred.nav_at_prediction)*100;
          await supa.updateFundPrediction(pred.id,{nav_at_close:d.nav,actual_roi:+actualRoi.toFixed(3)});
        }
        await sleep(300);
      }
    }
  }catch(e){console.warn('Prediction update check failed:',e.message)}
}

// MAIN PIPELINE — 6 steps
// ═══════════════════════════════════════════════════════════════
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function runPipeline(){
  if(APP.loading)return;
  APP.loading=true;APP.source='loading';
  const funds=getFunds();
  const weights=getWeights();
  const tiingo={};
  const fundsWithHoldings=[];
  
  function setPL(step,total,stepName,detail){APP.pipeline={step,total,stepName,detail};render()}
  
  // ── STEP 1: EDGAR Holdings ────────────────────────────────────
  setPL(1,6,'STEP 1 / 6',`Loading holdings for ${funds.length} funds from SEC EDGAR cache or filing...`);
  for(let i=0;i<funds.length;i++){
    const f=funds[i];
    setPL(1,6,'STEP 1 / 6',`SEC EDGAR: ${f.ticker} (${i+1}/${funds.length})`);
    render();
    if(APP.holdingsCache[f.ticker]){fundsWithHoldings.push({...f,holdings:APP.holdingsCache[f.ticker].holdings});continue}
    const cached=await supa.getHoldings(f.ticker);
    if(cached){
      const age=(Date.now()-new Date(cached.fetchedAt).getTime())/86400000;
      if(age<90){APP.holdingsCache[f.ticker]=cached;fundsWithHoldings.push({...f,holdings:cached.holdings});continue}
    }
    if(MONEY_MARKET_FUNDS.has(f.ticker)){fundsWithHoldings.push({...f,holdings:null});continue}
    const holdings=await fetchEdgarHoldings(f.ticker,f.name);
    if(holdings?.length){
      APP.holdingsCache[f.ticker]={holdings,fetchedAt:new Date().toISOString()};
      fundsWithHoldings.push({...f,holdings});
      await supa.saveHoldings(f.ticker,holdings,f.name);
    }else{fundsWithHoldings.push({...f,holdings:null})}
    await sleep(300);
  }
  
  // ── STEP 2: Tiingo NAV + Sector ETF Momentum ─────────────────
  setPL(2,6,'STEP 2 / 6','Fetching fund NAV, momentum & Sharpe ratios from Tiingo...');
  for(let i=0;i<funds.length;i++){
    setPL(2,6,'STEP 2 / 6',`Tiingo prices: ${funds[i].ticker} (${i+1}/${funds.length})`);render();
    const d=await fetchTiingo(funds[i].ticker);
    if(d)tiingo[funds[i].ticker]=d;
    await sleep(200);
  }
  setPL(2,6,'STEP 2 / 6','Fetching sector ETF momentum (XLK, XLF, XLE, XLV...)');render();
  const sectorMomentum=await fetchSectorMomentum();
  
  // ── STEP 3: World Intelligence ────────────────────────────────
  setPL(3,6,'STEP 3 / 6','Building world intelligence: FRED economic data + GDELT geopolitical news...');render();
  const worldData=await buildWorldIntelligence(detail=>{setPL(3,6,'STEP 3 / 6',detail);render()});
  APP.worldData=worldData;
  
  // ── STEP 4: Sector Scoring ────────────────────────────────────
  setPL(4,6,'STEP 4 / 6','Claude forming investment thesis and scoring all 11 GICS sectors...');render();
  const sectorResult=await scoreSectorsWithClaude(worldData,sectorMomentum);
  if(sectorResult){
    APP.sectorScores=sectorResult.sectorScores;
    APP.investmentThesis=sectorResult;
    APP.dominantTheme=sectorResult.dominantTheme;
  }
  
  // ── STEP 5: Holdings-Level Scoring + Fund Rollup ─────────────
  setPL(5,6,'STEP 5 / 6','Mapping holdings to GICS sectors, scoring each holding, rolling up to fund composite...');render();
  let rankedFunds=await scoreHoldingsAndRollup(fundsWithHoldings,APP.sectorScores,tiingo,sectorMomentum,weights);
  
  // Apply statistical analysis
  rankedFunds=applyStatisticalAnalysis(rankedFunds);
  APP.funds=rankedFunds;
  
  // ── STEP 6: Allocation + Investor Thesis ─────────────────────
  setPL(6,6,'STEP 6 / 6','Generating allocation recommendation and plain-English investor thesis...');render();
  const prof=activeProfile();
  const riskTolerance=prof?.risk||5;
  const allocationResult=buildAllocation(rankedFunds,riskTolerance);
  APP.allocationResult=allocationResult;
  
  const investorLetter=await generateInvestorThesis(rankedFunds,APP.sectorScores,APP.investmentThesis,allocationResult,riskTolerance);
  APP.investorLetter=investorLetter;
  
  // Store predictions for tracking
  APP.currentCycleId=await storePredictions(rankedFunds,worldData,APP.investmentThesis,allocationResult);
  
  // Save run to history
  if(prof){
    await supa.saveRun({
      user_id:prof.id,source:'live',
      macro_snapshot:(APP.investmentThesis?.thesis||'').slice(0,2000),
      model_weights:JSON.stringify(rankedFunds.map(f=>({ticker:f.ticker,composite:f.composite,roi:f.roi,tier:f.tier?.label}))),
      created_at:new Date().toISOString(),
    });
  }
  
  // Assess data quality — drives staleness warning in UI
  const fredOk=(worldData?.fredAvailable||0)>=4;
  const gdeltOk=(worldData?.headlineCount||0)>=6;
  const claudeUsedWebSearch=!fredOk; // Claude was asked to web search when FRED was sparse
  let staleness='live';
  if(!fredOk&&!gdeltOk) staleness='stale';
  else if(!fredOk||!gdeltOk) staleness='partial';
  APP.dataQuality={
    fredOk, gdeltOk,
    fredSeriesCount:worldData?.fredAvailable||0,
    fredSeriesTotal:Object.keys(FRED_SERIES).length,
    headlineCount:worldData?.headlineCount||0,
    claudeUsedWebSearch,
    staleness,  // 'live' | 'partial' | 'stale'
    assessedAt:new Date().toLocaleString(),
  };

  APP.source=APP.sectorScores?'live':'partial';
  APP.lastRun=new Date().toLocaleString();
  APP.selectedFund=rankedFunds[0]?.ticker;
  APP.loading=false;
  APP.pipeline={step:0,total:6,detail:'',stepName:''};
  render();
}

function renderDataQualityWarning(){
  const dq=APP.dataQuality;
  if(!dq||dq.staleness==='live')return'';

  if(dq.staleness==='stale'){
    return`<div style="background:var(--red-bg);border-bottom:2px solid var(--red-bd);padding:9px 24px;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap">
      <span style="font-size:14px;flex-shrink:0">⚠️</span>
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:2px">Macro data unavailable — scores reflect AI training knowledge, not live market conditions</div>
        <div style="font-size:11px;color:var(--red);line-height:1.6">
          FRED returned ${dq.fredSeriesCount}/${dq.fredSeriesTotal} economic series and GDELT returned ${dq.headlineCount} headlines — not enough to ground the thesis in current data.
          Claude is scoring sectors from its training knowledge, which has a cutoff date and may be months out of date.
          <b>Do not act on these scores.</b> Check that FRED_KEY is set correctly in Railway, then run again to restore live data.
        </div>
      </div>
    </div>`;
  }

  // partial — some data came through, some did not
  const missing=[];
  if(!dq.fredOk)missing.push(`FRED economic data (${dq.fredSeriesCount}/${dq.fredSeriesTotal} series fetched — check FRED_KEY in Railway)`);
  if(!dq.gdeltOk)missing.push(`GDELT geopolitical news (${dq.headlineCount} headlines — GDELT may be temporarily rate-limited)`);
  return`<div style="background:var(--amber-bg);border-bottom:1px solid var(--amber-bd);padding:8px 24px;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap">
    <span style="font-size:13px;flex-shrink:0">◑</span>
    <div>
      <div style="font-size:12px;font-weight:700;color:var(--amber);margin-bottom:2px">Partial live data — sector thesis may be less precise than usual</div>
      <div style="font-size:11px;color:var(--amber);line-height:1.6">
        ${missing.join(' · ')}.
        Claude supplemented the gaps with ${dq.claudeUsedWebSearch?'a live web search':'its training knowledge'}.
        Scores are directionally useful but not fully grounded in real-time data. Consider re-running once the data source recovers.
      </div>
    </div>
  </div>`;
}

function riskLabel(rt){
  if(rt<=1)return'Very Conservative';if(rt<=3)return'Conservative';
  if(rt<=4)return'Moderate-Conservative';if(rt===5)return'Balanced';
  if(rt<=6)return'Moderate-Aggressive';if(rt<=7)return'Growth';
  if(rt<=8)return'Aggressive';return'Very Aggressive';
}
function riskDescription(rt){
  if(rt<=2)return'You prioritize protecting your money above all else. FundLens will recommend stable, low-volatility funds that aim to beat inflation without significant risk of loss.';
  if(rt<=4)return'You want steady growth while limiting downside risk. FundLens will balance return potential with stability, avoiding the most volatile funds.';
  if(rt===5)return'You want a true balance between growth and protection. FundLens will recommend a diversified allocation across both stable and higher-growth funds.';
  if(rt<=7)return'You lean toward growth and are comfortable with some volatility in exchange for stronger potential returns. FundLens will concentrate allocation in the top-performing opportunities.';
  return'You prioritize maximum growth and accept the possibility of significant short-term losses. FundLens will aggressively concentrate your allocation in the statistical outliers with the highest predicted ROI.';
}

function buildRadarSVG(fund,dims,color,cx,cy,r){
  const N=dims.length,rd=d=>d*Math.PI/180;let svg='';
  [0.25,0.5,0.75,1].forEach(p=>{
    const pts=dims.map((_,i)=>{const a=-90+i*(360/N);return`${cx+r*p*Math.cos(rd(a))},${cy+r*p*Math.sin(rd(a))}`}).join(' ');
    svg+=`<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  });
  dims.forEach((d,i)=>{
    const a=-90+i*(360/N);
    const ax=cx+r*Math.cos(rd(a)),ay=cy+r*Math.sin(rd(a));
    const lx=cx+(r+18)*Math.cos(rd(a)),ly=cy+(r+18)*Math.sin(rd(a));
    svg+=`<line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="var(--border)" stroke-width="1"/>`;
    svg+=`<text x="${lx}" y="${ly}" fill="var(--text3)" font-size="9" font-family="Manrope,sans-serif" text-anchor="middle" dominant-baseline="middle">${d.label}</text>`;
  });
  const pts=dims.map((d,i)=>{const a=-90+i*(360/N);const v=Math.min(fund[d.key]||0,10)/10;return`${cx+r*v*Math.cos(rd(a))},${cy+r*v*Math.sin(rd(a))}`}).join(' ');
  svg+=`<polygon points="${pts}" fill="${color}" fill-opacity="0.12" stroke="${color}" stroke-width="1.5"/>`;
  return svg;
}

  let a=-90,o='';

    const sx=cx+r*Math.cos(rd(sa)),sy=cy+r*Math.sin(rd(sa));
    const ex=cx+r*Math.cos(rd(ea)),ey=cy+r*Math.sin(rd(ea));
    const ix=cx+inn*Math.cos(rd(ea)),iy=cy+inn*Math.sin(rd(ea));
    const jx=cx+inn*Math.cos(rd(sa)),jy=cy+inn*Math.sin(rd(sa));
    const la=p>0.5?1:0;
    const d=`M${sx} ${sy} A${r} ${r} 0 ${la} 1 ${ex} ${ey} L${ix} ${iy} A${inn} ${inn} 0 ${la} 0 ${jx} ${jy}Z`;
    const mid=sa+p*180,lx=cx+(r+14)*Math.cos(rd(mid)),ly=cy+(r+14)*Math.sin(rd(mid));
    const col=cfn(i);
    o+=`<path d="${d}" fill="${col}" opacity="0.85" stroke="white" stroke-width="2"/>`;
    if(p>0.05)o+=`<text x="${lx}" y="${ly}" fill="${col}" font-size="8" font-family="JetBrains Mono,monospace" font-weight="700" text-anchor="middle" dominant-baseline="middle">${it[lk]}</text>`;
    a=ea;
  });
  o+=`<circle cx="${cx}" cy="${cy}" r="${inn-3}" fill="white"/>`;
  cl.forEach((ln,i)=>o+=`<text x="${cx}" y="${cy+(i-cl.length/2+0.6)*14}" text-anchor="middle" fill="${ln.c}" font-size="${ln.sz||10}" font-family="Manrope,sans-serif" font-weight="${ln.w||400}">${ln.t}</text>`);
  return o;
}

// ═══════════════════════════════════════════════════════════════
// HISTORY TAB — Predicted vs Actual ROI tracking
// ═══════════════════════════════════════════════════════════════
async function renderHistory(){
  const prof=activeProfile();
  if(!prof)return'<div style="padding:40px;text-align:center;color:var(--text3)">No profile active.</div>';
  
  const cycles=await supa.getPredictionCycles(prof.id,12);
  if(!cycles?.length)return`<div style="padding:48px;text-align:center;color:var(--text3)">
    <div style="font-size:32px;margin-bottom:12px">📅</div>
    <div style="font-size:14px;font-weight:600;color:var(--text2)">No prediction history yet</div>
    <p style="font-size:12px;margin-top:8px;line-height:1.6">Each time you run an analysis, FundLens records its predictions here. After 90 days, actual prices are fetched automatically to measure how accurately the model identified the right stocks for that moment.</p>
  </div>`;
  
  // Calculate information coefficient across closed cycles
  const closedCycles=cycles.filter(c=>new Date(c.closes_at)<new Date());
  
  const cards=await Promise.all(cycles.map(async cycle=>{
    const preds=await supa.getFundPredictions(cycle.id);
    const date=new Date(cycle.created_at);
    const isClosed=new Date(cycle.closes_at)<new Date();
    const daysLeft=isClosed?0:Math.ceil((new Date(cycle.closes_at)-new Date())/86400000);
    
    // Top 3 predicted
    const top3=(preds||[]).sort((a,b)=>b.predicted_composite-a.predicted_composite).slice(0,3);
    
    // Accuracy metrics (if closed)
    let accuracyHtml='';
    if(isClosed&&preds?.some(p=>p.actual_roi!==null)){
      const closed=preds.filter(p=>p.actual_roi!==null);
      const mae=closed.reduce((s,p)=>s+Math.abs(p.predicted_roi-p.actual_roi),0)/closed.length;
      const directional=closed.filter(p=>(p.predicted_roi>=0)===(p.actual_roi>=0)).length/closed.length;
      
      // Spearman IC (simplified rank correlation)
      const n=closed.length;
      let ic=null;
      if(n>=4){
        const predRanks=rankArray(closed.map(p=>p.predicted_roi));
        const actualRanks=rankArray(closed.map(p=>p.actual_roi));
        const d2=predRanks.reduce((s,pr,i)=>s+Math.pow(pr-actualRanks[i],2),0);
        ic=+(1-(6*d2)/(n*(n*n-1))).toFixed(3);
      }
      
      const icClass=ic===null?'':ic>=0.1?'ic-good':ic>=0?'ic-ok':'ic-bad';
      accuracyHtml=`<div style="margin-top:12px;padding:10px 14px;background:var(--surface2);border-radius:7px;font-size:11px;display:flex;gap:16px;flex-wrap:wrap">
        <div><div class="label">Directional Accuracy</div><div style="font-weight:700;color:${directional>=0.6?'var(--green)':directional>=0.5?'var(--amber)':'var(--red)'}">${(directional*100).toFixed(0)}%</div></div>
        <div><div class="label">MAE (Avg Error)</div><div style="font-weight:700">${mae.toFixed(2)}pp</div></div>
        ${ic!==null?`<div><div class="label">Spearman IC</div><div class="score-md ${icClass}">${ic.toFixed(3)}</div></div>`:''}
        <div style="font-size:10px;color:var(--text3);align-self:center">${closed.length} funds with actual data · IC >0.05 = effective model</div>
      </div>`;
      
      // Show predicted vs actual for each fund
      const fundRows=closed.sort((a,b)=>b.predicted_composite-a.predicted_composite).map(p=>{
        const err=p.actual_roi-p.predicted_roi;
        return`<div style="display:flex;gap:12px;padding:5px 0;border-bottom:1px solid var(--bg);font-size:11px;align-items:center">
          <span style="font-family:'JetBrains Mono',monospace;font-weight:700;width:50px">${p.fund_ticker}</span>
          <span style="color:var(--text3);width:80px">pred: <b class="${p.predicted_roi>=0?'pos':'neg'}">${(p.predicted_roi>=0?'+':'')+p.predicted_roi.toFixed(1)}%</b></span>
          <span style="color:var(--text3);width:80px">actual: <b class="${p.actual_roi>=0?'pos':'neg'}">${(p.actual_roi>=0?'+':'')+p.actual_roi.toFixed(1)}%</b></span>
          <span style="color:${Math.abs(err)<2?'var(--green)':Math.abs(err)<5?'var(--amber)':'var(--red)'}">err: ${err>=0?'+':''}${err.toFixed(1)}pp</span>
          <span class="badge ${p.predicted_tier==='BREAKAWAY'?'t1':p.predicted_tier==='STRONG'?'t1':p.predicted_tier==='SOLID'?'t2':p.predicted_tier==='NEUTRAL'?'t3':'t4'}" style="font-size:9px">${p.predicted_tier||'?'}</span>
        </div>`;
      }).join('');
      
      if(closed.length>0)accuracyHtml+=`<div style="margin-top:8px">${fundRows}</div>`;
    }
    
    return`<div class="card fade-in" style="margin-bottom:16px">
      <div class="card-header">
        <div>
          <div style="font-weight:700">${date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
          <div style="font-size:11px;color:var(--text3)">${date.toLocaleTimeString()} · ${isClosed?'Closed — accuracy computed':`${daysLeft} days until close`}</div>
        </div>
        <div style="display:flex;gap:10px">
          ${top3.map(f=>`<div style="text-align:center"><div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700">${f.fund_ticker}</div><div style="font-size:10px;color:var(--text3)">${(f.predicted_composite||0).toFixed(2)} · ${f.predicted_tier||'?'}</div></div>`).join('')}
        </div>
      </div>
      ${cycle.investment_thesis?`<div style="padding:12px 18px;font-size:11px;color:var(--text2);line-height:1.6;border-bottom:1px solid var(--border)">${cycle.investment_thesis.slice(0,280)}…</div>`:''}
      ${cycle.dominant_theme?`<div style="padding:8px 18px;font-size:11px;background:var(--surface2)"><b>Theme:</b> ${cycle.dominant_theme} · <b>Risk profile:</b> ${riskLabel(cycle.risk_tolerance||5)}</div>`:''}
      ${accuracyHtml?`<div style="padding:12px 18px">${accuracyHtml}</div>`:'<div style="padding:12px 18px;font-size:11px;color:var(--text3)">Actual ROI will be automatically calculated when this cycle closes in ${daysLeft} days.</div>'}
    </div>`;
  }));
  
  // Overall model accuracy summary
  let modelSummaryHtml='';
  if(closedCycles.length>=2){
    modelSummaryHtml=`<div class="card" style="margin-bottom:20px;background:var(--surface2)">
      <div class="card-header"><div style="font-weight:700">Model Accuracy Summary</div><div style="font-size:11px;color:var(--text3)">${closedCycles.length} closed prediction cycles</div></div>
      <div class="card-body"><p style="font-size:12px;color:var(--text2)">Accuracy metrics are calculated per-cycle above. Track Information Coefficient (IC) across cycles — a consistent IC of 0.05–0.10 indicates an effective ranking model. As more cycles close, FundLens will use this data to recalibrate factor weights (Bayesian updating begins after 4 completed cycles).</p></div>
    </div>`;
  }
  
  return`<div style="padding:24px;overflow-y:auto;max-height:calc(100vh - 176px)">
    ${modelSummaryHtml}
    <div class="label" style="margin-bottom:16px">Prediction History · ${cycles.length} analysis runs</div>
    ${cards.join('')}
  </div>`;
}

function rankArray(arr){
  const sorted=[...arr].map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v);
  const ranks=new Array(arr.length);
  sorted.forEach((item,rank)=>ranks[item.i]=rank+1);
  return ranks;
}

function updateProfile(key,val){const prof=activeProfile();if(!prof)return;prof[key]=val;saveProfiles()}
function updateWeight(key,val){
  const prof=activeProfile();if(!prof)return;
  prof.weights=prof.weights||{...DEFAULT_WEIGHTS};prof.weights[key]=val;saveProfiles();
  const tot=Object.values(prof.weights).reduce((s,v)=>s+v,0);
  document.querySelectorAll('[id^="w_"]').forEach(el=>{const k=el.id.replace('w_','');if(prof.weights[k]!==undefined)el.textContent=prof.weights[k]+'%'});
}
function addFundToProfile(){
  const inp=document.getElementById('addFundInput');
  const t=(inp?.value||'').trim().toUpperCase();if(!t)return;
  const prof=activeProfile();if(!prof||prof.funds.find(f=>f.ticker===t))return;
  prof.funds.push({ticker:t,name:t});saveProfiles();if(inp)inp.value='';render();
}
function removeFundFromProfile(ticker){
  const prof=activeProfile();if(!prof)return;
  prof.funds=prof.funds.filter(f=>f.ticker!==ticker);saveProfiles();render();
}

// PIPELINE OVERLAY — 6 steps
// ═══════════════════════════════════════════════════════════════
function renderPipelineOverlay(){
  if(!APP.loading)return'';
  const{step,total,detail}=APP.pipeline;
  const pct=(step/total)*100;
  const steps=[
    {label:'SEC EDGAR Holdings',desc:'Fetch N-PORT filings — 90-day cache'},
    {label:'Tiingo Prices + Sector ETFs',desc:'NAV, momentum, Sharpe + sector ETF trends'},
    {label:'World Intelligence',desc:'FRED economic data + GDELT geopolitical news'},
    {label:'Claude Sector Scoring',desc:'Investment thesis + 11 GICS sector scores'},
    {label:'Holdings Rollup',desc:'Map holdings → sectors → fund composite'},
    {label:'Allocation + Thesis',desc:'Risk-adjusted allocation + investor letter'},
  ];
  return`<div style="position:fixed;inset:0;background:rgba(247,245,240,0.95);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center">
    <div class="card fade-in" style="width:480px;padding:32px;box-shadow:var(--shadow-md)">
      <div style="font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;margin-bottom:4px">Running Analysis</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:20px">Identifying the right stocks for this moment — 30–90 day tactical window</div>
      <div class="pbar-wrap" style="height:6px;margin-bottom:24px"><div class="pbar-fill" style="width:${pct}%;background:var(--green)"></div></div>
      ${steps.map((s,i)=>{
        const isDone=i<step-1,isActive=i===step-1;
        return`<div class="pipeline-step">
          <div class="pipeline-dot ${isDone?'done':isActive?'active':'pending'}">${isDone?'✓':isActive?`<div class="spinner" style="width:10px;height:10px;border-width:1.5px"></div>`:i+1}</div>
          <div><div style="font-size:13px;font-weight:${isActive?700:600};color:${isDone?'var(--green)':isActive?'var(--text)':'var(--text3)'}">${s.label}</div>
          <div style="font-size:11px;color:var(--text3)">${isActive?detail:s.desc}</div></div>
        </div>`;
      }).join('')}
      <div style="margin-top:16px;padding:10px 12px;background:var(--surface2);border-radius:7px;font-size:11px;color:var(--text3)">
        Estimated time: 5–8 minutes. Holdings are cached for 90 days — subsequent runs are faster. You can navigate away; the analysis runs in the background.
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init(){
  APP.profiles=loadProfiles();
  if(APP.profiles.length){
    APP.activeProfile=APP.profiles[0].id;
    APP.wizard=false;
    const prof=activeProfile();
    
    // Preload holdings cache from Supabase
    try{
      const rows=await supa.h.get('holdings_cache','?select=fund_ticker,holding_name,holding_ticker,weight,market_value,asset_type,sector,indexed_at&order=indexed_at.desc');
      if(Array.isArray(rows)){
        const grouped={};
        rows.forEach(row=>{
          const ft=row.fund_ticker;if(!ft)return;
          if(!grouped[ft])grouped[ft]={holdings:[],fetchedAt:row.indexed_at};
          grouped[ft].holdings.push({name:row.holding_name||'',ticker:row.holding_ticker||'',pctVal:row.weight||0,valUSD:row.market_value||0,assetCat:row.asset_type||'',sector:row.sector||'',cusip:''});
        });
        Object.entries(grouped).forEach(([ticker,data])=>{
          const age=(Date.now()-new Date(data.fetchedAt).getTime())/86400000;
          if(age<90&&!APP.holdingsCache[ticker])APP.holdingsCache[ticker]=data;
        });
      }
    }catch(e){}
    
    // Preload sector mapping cache from Supabase
    try{
      const rows=await supa.h.get('sector_mappings','?select=ticker,sector&limit=2000');
      if(Array.isArray(rows))rows.forEach(r=>{if(r.ticker&&r.sector)APP.sectorMappingCache[r.ticker]=r.sector});
    }catch(e){}
    
    // Build initial composite from seeds
    APP.funds=(prof.funds||DEFAULT_FUNDS).map(f=>({
      ...f,...(SEED[f.ticker]||{composite:5,roi:0}),
      tier:getTierFromModZ(0),modZ:0,momentum:5,riskAdj:5,
      worldThesisScore:5,returnScore:5,sectorBreakdown:{},
      alert:ALERTS[f.ticker]||null,
      holdings:APP.holdingsCache[f.ticker]?.holdings||null,
    }));
    APP.funds=applyStatisticalAnalysis(APP.funds);
    APP.selectedFund=APP.funds[0]?.ticker;
    
    // Check for closed prediction cycles (update actual ROI in background)
    checkAndUpdateClosedPredictions().catch(()=>{});
  }
  render();
}

init();
