<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FundLens — 401K Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #F7F5F0;
  --surface:    #FFFFFF;
  --surface2:   #F0EDE8;
  --border:     #E2DDD8;
  --border2:    #D0CAC3;
  --text:       #111418;
  --text2:      #5C6370;
  --text3:      #9AA0AD;
  --green:      #059669;
  --green-bg:   #ECFDF5;
  --green-bd:   #A7F3D0;
  --amber:      #B45309;
  --amber-bg:   #FFFBEB;
  --amber-bd:   #FDE68A;
  --blue:       #1D4ED8;
  --blue-bg:    #EFF6FF;
  --blue-bd:    #BFDBFE;
  --red:        #DC2626;
  --red-bg:     #FEF2F2;
  --red-bd:     #FCA5A5;
  --accent:     #1D4ED8;
  --radius:     10px;
  --shadow:     0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:'Manrope',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Manrope',sans-serif;font-weight:600;font-size:13px;
  transition:all 0.15s;white-space:nowrap;
}
.btn-primary{background:var(--text);color:#fff;}
.btn-primary:hover{background:#333;}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#047857;}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-bd);}
.btn-danger:hover{background:var(--red-bg);}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-body{padding:22px}
/* Inputs */
input[type="text"],input[type="number"],textarea,select{
  font-family:'Manrope',sans-serif;font-size:13px;color:var(--text);
  background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:9px 12px;outline:none;transition:border-color 0.15s;width:100%;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);padding:0 24px;}
.tab{
  padding:11px 16px;font-size:12px;font-weight:600;letter-spacing:0.3px;
  color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;
  font-family:'Manrope',sans-serif;transition:color 0.15s;
}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--text);border-bottom-color:var(--text);}
/* Tier badges */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.5px;font-family:'JetBrains Mono',monospace}
.t1{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.t2{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.t3{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.t4{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
/* Score number */
.score-xl{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;line-height:1}
.score-lg{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}
.score-md{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}
.score-sm{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:400}
/* ROI color */
.pos{color:var(--green)}
.neg{color:var(--red)}
/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
/* Progress bar */
.pbar-wrap{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
/* Label */
.label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase}
/* Source badge */
.src-live{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.src-seed{background:#F1F5F9;color:#64748B;border:1px solid #CBD5E1;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.src-partial{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
/* Alert banner */
.alert-banner{background:var(--amber-bg);border-bottom:1px solid var(--amber-bd);padding:8px 24px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* Wizard */
.wizard-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:var(--bg)}
.wizard-card{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-md);overflow:hidden}
.wizard-header{padding:32px 36px 24px;border-bottom:1px solid var(--border);background:var(--bg)}
.wizard-body{padding:32px 36px}
.wizard-footer{padding:20px 36px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.step-dots{display:flex;gap:6px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background 0.2s}
.step-dot.on{background:var(--text)}
/* Fund chip */
.fund-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600}
.fund-chip button{background:none;border:none;cursor:pointer;color:var(--text3);padding:0;font-size:14px;line-height:1;transition:color 0.1s}
.fund-chip button:hover{color:var(--red)}
/* Holdings row */
.holding-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.holding-row:last-child{border-bottom:none}
/* Tooltip-like note */
.note{font-size:11px;color:var(--text3);line-height:1.5}
/* Grid utilities */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:680px){.grid-2,.grid-3{grid-template-columns:1fr}}
/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:0.8px;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--bg);vertical-align:middle}
.data-table tr:hover td{background:var(--surface2)}
.data-table tr.selected td{background:var(--blue-bg)}
/* Smooth fade-in */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn 0.25s ease both}
/* Setup radar SVG wrapper */
.radar-wrap{display:flex;justify-content:center}
/* Header */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.app-logo{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;letter-spacing:-0.3px}
.app-logo span{color:var(--green)}
/* Metric card */
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.metric-label{font-size:10px;font-weight:700;letter-spacing:0.8px;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.metric-value{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px}
/* Step progress */
.pipeline-step{display:flex;gap:10px;padding:10px 0;align-items:flex-start}
.pipeline-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px}
.pipeline-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.pipeline-dot.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pipeline-dot.pending{background:var(--surface);border-color:var(--border)}
/* Donut */
.donut-wrap{display:flex;justify-content:center;align-items:flex-start;gap:20px;flex-wrap:wrap}
</style>
</head>
<body>

<script>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let APP = {
  // Wizard

// ═══════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════
const LS = {

// ═══════════════════════════════════════════════════════════════
// SUPABASE REST
// ═══════════════════════════════════════════════════════════════
const supa = {
  headers: { 'Content-Type':'application/json', 'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY },
  async get(table, params='') {
    try {
      const r = await fetch(`/api/supabase/${table}${params}`, {headers:this.headers});
      if(!r.ok) { console.error(`Supabase GET ${table} failed:`, r.status, await r.text()); return null; }
      return r.json();
    } catch(e) { console.error(`Supabase GET ${table} error:`, e.message); return null; }
  },
  async post(table, body) {
    try {
      const r = await fetch(`/api/supabase/${table}`, {
        method:'POST', headers:{...this.headers,'Prefer':'return=representation'}, body:JSON.stringify(body)
      });
      if(!r.ok) { console.error(`Supabase POST ${table} failed:`, r.status, await r.text()); return null; }
      return r.json();
    } catch(e) { console.error(`Supabase POST ${table} error:`, e.message); return null; }
  },
  async getHoldings(ticker) {
    // Schema is row-per-holding: fund_ticker, holding_name, holding_ticker, weight, market_value, shares, asset_type, sector, indexed_at
    const rows = await this.get('holdings_cache', `?fund_ticker=eq.${ticker}&select=*&order=weight.desc`);
    if(!rows?.length) return null;
    const holdings = rows.map(r => ({
      name:     r.holding_name || '',
      ticker:   r.holding_ticker || '',
      pctVal:   r.weight || 0,
      valUSD:   r.market_value || 0,
      assetCat: r.asset_type || '',
      sector:   r.sector || '',
      cusip:    '', // not stored in DB, only in memory
    }));
    return { holdings, fetchedAt: rows[0].indexed_at };
  },
  async saveHoldings(ticker, holdings, fundName) {
    try {
      // Delete old rows for this fund
      const delRes = await fetch(`/api/supabase/holdings_cache?fund_ticker=eq.${ticker}`, {method:'DELETE', headers:this.headers});
      if(!delRes.ok) console.error(`Supabase DELETE holdings_cache failed:`, delRes.status, await delRes.text());
      // Insert one row per holding (batch)
      const now = new Date().toISOString();
      const rows = holdings.slice(0, 200).map(h => ({
        fund_ticker:    ticker,
        holding_name:   h.name || '',
        holding_ticker: h.ticker || null,
        weight:         h.pctVal || 0,
        market_value:   h.valUSD || null,
        shares:         h.shares || null,
        asset_type:     h.assetCat || null,
        sector:         h.sector || null,
        indexed_at:     now,
      }));
      return this.post('holdings_cache', rows);
    } catch(e) { return null; }
  },
  async saveRun(runData) {
    return this.post('runs', runData);
  },
  async getRuns(userId, limit=20) {
    return this.get('runs', `?user_id=eq.${userId}&select=*&order=created_at.desc&limit=${limit}`);
  },
};

// ═══════════════════════════════════════════════════════════════
// EDGAR HOLDINGS FETCH
// ═══════════════════════════════════════════════════════════════
async function fetchEdgarHoldings(ticker, fundName) {
  try {
    // Step 1: Find CIK via EDGAR full-text search (adsh + ciks[] are in _source directly)
    const query = encodeURIComponent(`"${ticker}" OR "${fundName.split(' ').slice(0,3).join(' ')}"`);
    const searchUrl = `/api/efts/LATEST/search-index?q=${query}&forms=NPORT-P`;
    const res = await fetch(searchUrl, {signal:AbortSignal.timeout(12000)});
    if(!res.ok) return null;
    const data = await res.json();
    const hits = data?.hits?.hits;
    if(!hits?.length) return null;

    // CIK and accession number are both directly in _source — no second roundtrip
    const src = hits[0]._source;
    const rawCik = src.ciks?.[0];
    if(!rawCik) return null;
    const cik = rawCik.replace(/^0+/, ''); // strip leading zeros for URL
    const padded = rawCik.padStart(10, '0'); // 10-digit padded for submissions API

    // Step 2: Use submissions API to find the MOST RECENT NPORT-P filing
    // (full-text search index can return stale results)
    const subUrl = `/api/edgar/submissions/CIK${padded}.json`;
    const subRes = await fetch(subUrl, {signal:AbortSignal.timeout(12000)});
    if(!subRes.ok) {
      // Fallback: use accession number from search result directly
      const adsh = src.adsh;
      if(!adsh) return null;
      return await fetchNportByAccession(cik, adsh, ticker);
    }
    const subData = await subRes.json();
    const filings = subData.filings?.recent;
    if(!filings?.form) return null;

    // Find index of most recent NPORT-P
    let latestIdx = -1;
    filings.form.forEach((form, i) => {
      if(form === 'NPORT-P') {
        if(latestIdx === -1 || filings.filingDate[i] > filings.filingDate[latestIdx]) latestIdx = i;
      }
    });
    if(latestIdx === -1) return null;

    const accNo = filings.accessionNumber[latestIdx]; // "0001193125-24-123456"
    console.log(`EDGAR: ${ticker} CIK=${cik} latest NPORT-P filed ${filings.filingDate[latestIdx]} accNo=${accNo}`);
    return await fetchNportByAccession(cik, accNo, ticker);
  } catch(e) {
    console.warn(`EDGAR search failed for ${ticker}:`, e.message);
    return null;
  }
}

async function fetchNportByAccession(cik, accNo, ticker) {
  try {
    // Get filing index
    const accNoDashes = accNo.replace(/-/g,'');
    const indexUrl = `/api/www4sec/Archives/edgar/data/${cik}/${accNoDashes}/`;
    const idxRes = await fetch(indexUrl, {signal:AbortSignal.timeout(10000)});
    if(!idxRes.ok) return null;
    const idxHtml = await idxRes.text();
    // Find the primary XML file
    const xmlMatch = idxHtml.match(/href="([^"]+\.xml)"/i);
    if(!xmlMatch) return null;
    const xmlFile = xmlMatch[1].startsWith('/') ? `/api/www4sec${xmlMatch[1]}` : `${indexUrl}${xmlMatch[1]}`;

    // Fetch and parse XML
    const xmlRes = await fetch(xmlFile, {signal:AbortSignal.timeout(20000)});
    if(!xmlRes.ok) return null;
    const xmlText = await xmlRes.text();
    return parseNportXML(xmlText, ticker);
  } catch(e) {
    console.warn(`NPORT fetch failed for CIK ${cik}:`, e.message);
    return null;
  }
}

function parseNportXML(xmlText) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'application/xml');
    const holdings = [];
    const invstOrSecs = doc.querySelectorAll('invstOrSec');
    invstOrSecs.forEach(el => {
      const get = tag => el.querySelector(tag)?.textContent?.trim() || '';
      const pctVal = parseFloat(get('pctVal')) || 0;
      if(pctVal <= 0) return; // skip zero-weight holdings
      const tickerEl = el.querySelector('identifiers ticker value') || el.querySelector('ticker value');
      holdings.push({
        name:     get('name'),
        ticker:   tickerEl ? tickerEl.textContent.trim() : '',
        cusip:    get('cusip'),
        pctVal,
        valUSD:   parseFloat(get('valUSD')) || 0,
        assetCat: get('assetCat'), // EC=equity, DBT=debt, RC=reg fund
        country:  get('invCountry'),
      });
    });
    // Sort by weight descending
    holdings.sort((a,b) => b.pctVal - a.pctVal);
    // Normalize if raw sum exceeds 110% (funds with leverage, repos, or derivatives
    // can legitimately exceed 100%, but >110% likely indicates duplicate entries or
    // fractional storage — normalize to relative weights that sum to 100%)
    const rawTotal = holdings.reduce((s,h) => s+h.pctVal, 0);
    if(rawTotal > 110) {
      holdings.forEach(h => { h.pctVal = +(h.pctVal / rawTotal * 100).toFixed(4); });
    }
    return holdings.length ? holdings : null;
  } catch(e) {
    console.warn('XML parse error:', e.message);
    return null;
  }
}

// TIINGO
// ═══════════════════════════════════════════════════════════════
async function fetchTiingo(ticker) {
  const end = new Date();
  const start = new Date(); start.setFullYear(start.getFullYear()-1);
  const fmt = d => d.toISOString().split('T')[0];
  const url = `/api/tiingo/tiingo/daily/${ticker}/prices?startDate=${fmt(start)}&endDate=${fmt(end)}`;
  try {
    const r = await fetch(url, {signal:AbortSignal.timeout(10000)});
    if(!r.ok) return null;
    const data = await r.json();
    if(!Array.isArray(data) || data.length < 20) return null;
    const prices = data.map(d=>d.adjClose||d.close).filter(Boolean);
    const latest = prices[prices.length-1];
    const p63 = prices[Math.max(0,prices.length-64)];
    const mom63 = ((latest-p63)/p63)*100;
    const momentum = Math.min(10, Math.max(0, 5+mom63*0.4));
    const rets = [];
    for(let i=1;i<prices.length;i++) rets.push((prices[i]-prices[i-1])/prices[i-1]);
    const mean = rets.reduce((s,r)=>s+r,0)/rets.length*252;
    const variance = rets.reduce((s,r)=>s+Math.pow(r-mean/252,2),0)/rets.length;
    const std = Math.sqrt(variance)*Math.sqrt(252);
    const sharpe = std>0?(mean-0.043)/std:0;
    const riskAdj = Math.min(10, Math.max(0, 5+sharpe*1.8));
    return { momentum:+momentum.toFixed(2), riskAdj:+riskAdj.toFixed(2), nav:latest };
  } catch(e) { return null; }
}

async function scoreHoldingsWithAI(fundsWithHoldings, macroContext) {
  // Build a compact representation of all unique holdings across funds
  const allHoldings = new Map(); // ticker/name → {name, ticker, assetCat, funds:[{fundTicker,pctVal}]}
  fundsWithHoldings.forEach(f => {
    (f.holdings || []).forEach(h => {
      const key = h.ticker || h.name;
      if(!allHoldings.has(key)) allHoldings.set(key, {...h, funds:[]});
      allHoldings.get(key).funds.push({fund:f.ticker, pctVal:h.pctVal});
    });
  });

  // For AI scoring, take the top holdings by fund weight (limit to keep prompt small)
  // Group by fund, take top 20 holdings per fund
  const holdingSummary = fundsWithHoldings.map(f => {
    const top = (f.holdings||[]).slice(0,20).map(h=>`${h.name||h.ticker}(${h.pctVal.toFixed(1)}%,${h.assetCat||'?'})`).join(', ');
    return `${f.ticker}: [${top}]`;
  }).join('\n');

  const prompt = `You are a quantitative fund analyst. Based on the macro environment and holdings, score each fund.

MACRO CONTEXT:
${macroContext || 'Gold ~$5100, DXY ~99 weakening, Fed 3.5%, "Sell America" theme, EAFE +8% YTD, EM +14% YTD, S&P500 -1.5% YTD'}

FUND HOLDINGS (top holdings by weight):
${holdingSummary}

Score each fund on:
1. macro (0-10): How well do the actual HOLDINGS benefit from current macro? Consider each asset class, sector, geography.
2. manager (0-10): Based on fund type and name, manager quality/tenure/stability
3. roi (number): Predicted % return next quarter. Be data-driven. Holdings that face "Sell America" headwinds should get negative ROI.

Return ONLY valid JSON:
{"scores":{"TICKER":{"macro":X,"manager":X,"roi":X},...}}`;

  try {
    const res = await fetch('/api/claude', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':'','anthropic-version':'2023-06-01'},
      body: JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:1200, messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok) return null;
    const data = await res.json();
    const text = (data.content||[]).find(b=>b.type==='text')?.text||'';
    const clean = text.replace(/```json|```/g,'').trim();
    return JSON.parse(clean).scores;
  } catch(e) { console.warn('AI scoring error:', e); return null; }
}

// ═══════════════════════════════════════════════════════════════
// COMPOSITE ENGINE
// ═══════════════════════════════════════════════════════════════
function buildComposite(funds, tiingo, aiScores, weights) {
  const W = weights || DEFAULT_WEIGHTS;
  const rois = funds.map(f => aiScores?.[f.ticker]?.roi ?? SEED[f.ticker]?.roi ?? 0);
  const mn = Math.min(...rois), mx = Math.max(...rois);
  const normROI = v => mx===mn ? 5 : ((v-mn)/(mx-mn))*10;

  return funds.map(f => {
    const t = f.ticker;
    const macro     = aiScores?.[t]?.macro    ?? SEED[t]?.macro    ?? 5;
    const manager   = aiScores?.[t]?.manager  ?? SEED[t]?.manager  ?? 5;
    const roi       = aiScores?.[t]?.roi      ?? SEED[t]?.roi      ?? 0;
    const momentum  = tiingo?.[t]?.momentum   ?? SEED[t]?.momentum ?? 5;
    const riskAdj   = tiingo?.[t]?.riskAdj    ?? SEED[t]?.riskAdj  ?? 5;
    const returnScore = +normROI(roi).toFixed(2);

    const composite = +(
      macro       * (W.macro/100) +
      momentum    * (W.momentum/100) +
      manager     * (W.manager/100) +
      riskAdj     * (W.riskAdj/100) +
      returnScore * (W.returnScore/100)
    ).toFixed(2);

    return { ticker:t, name:f.name, macro, manager, roi, momentum, riskAdj, returnScore, composite,
      alert: ALERTS[t]||null, nav: tiingo?.[t]?.nav||null,
      holdings: APP.holdingsCache[t]?.holdings||null };
  }).sort((a,b) => b.composite-a.composite);
}

// ═══════════════════════════════════════════════════════════════
const sleep = ms => new Promise(r=>setTimeout(r,ms));

async function runPipeline() {
  if(APP.loading) return;
  APP.loading = true; APP.source = 'loading';
  const funds = getFunds();
  const weights = getWeights();
  const tiingo = {}, fundsWithHoldings = [];
  let aiScores = null, macroText = null;

  setPipeline(0, 4, 'STEP 1 / 4', `Fetching holdings from SEC EDGAR for ${funds.length} funds...`);
  render();

  // Step 1: EDGAR holdings
  for(let i=0; i<funds.length; i++) {
    const f = funds[i];
    setPipeline(1, 4, 'STEP 1 / 4', `SEC EDGAR: ${f.ticker} (${i+1}/${funds.length})`);
    render();

    // Check in-memory cache first
    if(APP.holdingsCache[f.ticker]) {
      fundsWithHoldings.push({ticker:f.ticker, name:f.name, holdings:APP.holdingsCache[f.ticker].holdings});
      continue;
    }
    // Check Supabase cache
    const cached = await supa.getHoldings(f.ticker);
    if(cached) {
      const age = (Date.now()-new Date(cached.fetchedAt).getTime()) / 86400000;
      if(age < 90) {
        APP.holdingsCache[f.ticker] = {holdings: cached.holdings, fetchedAt: cached.fetchedAt};
        fundsWithHoldings.push({ticker:f.ticker, name:f.name, holdings: cached.holdings});
        continue;
      }
    }
    // Fetch from EDGAR
    const holdings = await fetchEdgarHoldings(f.ticker, f.name);
    if(holdings?.length) {
      APP.holdingsCache[f.ticker] = {holdings, fetchedAt:new Date().toISOString()};
      fundsWithHoldings.push({ticker:f.ticker, name:f.name, holdings});
      await supa.saveHoldings(f.ticker, holdings, f.name);
    } else {
      fundsWithHoldings.push({ticker:f.ticker, name:f.name, holdings:null});
    }
    await sleep(300);
  }

  // Step 2: Tiingo NAV + momentum + Sharpe
  setPipeline(2, 4, 'STEP 2 / 4', `Fetching live NAV + momentum + Sharpe from Tiingo...`);
  render();
  for(let i=0; i<funds.length; i++) {
    setPipeline(2, 4, 'STEP 2 / 4', `Tiingo: ${funds[i].ticker} (${i+1}/${funds.length})`);
    render();
    const d = await fetchTiingo(funds[i].ticker);
    if(d) tiingo[funds[i].ticker] = d;
    await sleep(200);
  }

  // Step 3: Macro web search
  setPipeline(3, 4, 'STEP 3 / 4', 'Searching live macro data: gold, DXY, rates, VIX, global returns...');
  render();
  macroText = await fetchMacro();
  APP.macroText = macroText;
  await sleep(500); // brief pause before AI scoring

  // Step 4: AI scoring
  setPipeline(4, 4, 'STEP 4 / 4', 'AI scoring holdings → fund composites...');
  render();
  const fundsWithHoldingsData = fundsWithHoldings.filter(f=>f.holdings?.length);
  const fundsWithoutHoldings = fundsWithHoldings.filter(f=>!f.holdings?.length);

  if(fundsWithHoldingsData.length) {
    aiScores = await scoreHoldingsWithAI(fundsWithHoldingsData, macroText) || {};
  } else {
    aiScores = {};
  }
  if(fundsWithoutHoldings.length) {
    const fallback = await scoreFundsWithAI(fundsWithoutHoldings.map(f=>f.ticker), macroText);
    if(fallback) Object.assign(aiScores, fallback);
  }

  // Build composite
  APP.funds = buildComposite(funds, tiingo, aiScores, weights);
  APP.source = aiScores && Object.keys(aiScores).length > 0 ? 'live' : 'seed';
  APP.lastRun = new Date().toLocaleString();
  APP.selectedFund = APP.funds[0]?.ticker;

  // Save run
  const prof = activeProfile();
  if(prof) {
    await supa.saveRun({
      user_id: prof.id,
      source: APP.source,
      macro_snapshot: macroText?.slice(0,4000)||null,
      model_weights: JSON.stringify(APP.funds.map(f=>({ticker:f.ticker,composite:f.composite,roi:f.roi,macro:f.macro,manager:f.manager,momentum:f.momentum,riskAdj:f.riskAdj}))),
      created_at: new Date().toISOString()
    });
  }

  APP.loading = false;
  APP.pipeline = {step:0, total:4, detail:'', stepName:''};
  render();
}

function setPipeline(step, total, stepName, detail) {
  APP.pipeline = {step, total, stepName, detail};
}

    risk:wizardData.risk, horizon:wizardData.horizon,
    goals:wizardData.goals, contribution:wizardData.contribution, frequency:wizardData.frequency,
    funds:wizardData.funds,
    weights:DEFAULT_WEIGHTS, createdAt:new Date().toISOString()
  };
  APP.profiles.push(profile);
  APP.activeProfile = id;
  saveProfiles();
  APP.wizard = false;
  APP.funds = buildComposite(profile.funds, null, null, profile.weights);
  APP.selectedFund = APP.funds[0]?.ticker;
  render();
  // Auto-start pipeline
  setTimeout(runPipeline, 100);
}

function addFund() {
  const t = (wizardData.fundInput||'').trim().toUpperCase();
  if(!t) return;
  if(wizardData.funds.find(f=>f.ticker===t)) { wizardData.fundInput=''; render(); return; }
  wizardData.funds.push({ticker:t, name:t});
  wizardData.fundInput = '';
  render();
}

function removeFund(ticker) {
  wizardData.funds = wizardData.funds.filter(f=>f.ticker!==ticker);

}

function buildRadarSVG(fund, dims, color, cx, cy, r) {
  const N = dims.length, rd = d => d*Math.PI/180;
  let svg = '';
  // Grid
  [0.25,0.5,0.75,1].forEach(p=>{
    const pts = dims.map((_,i)=>{
      const a=-90+i*(360/N);
      return `${cx+r*p*Math.cos(rd(a))},${cy+r*p*Math.sin(rd(a))}`;
    }).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  });
  // Axes + labels
  dims.forEach((d,i)=>{
    const a=-90+i*(360/N);
    const ax=cx+r*Math.cos(rd(a)), ay=cy+r*Math.sin(rd(a));
    const lx=cx+(r+18)*Math.cos(rd(a)), ly=cy+(r+18)*Math.sin(rd(a));
    svg += `<line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="var(--border)" stroke-width="1"/>`;
    svg += `<text x="${lx}" y="${ly}" fill="var(--text3)" font-size="9" font-family="Manrope,sans-serif" text-anchor="middle" dominant-baseline="middle">${d.label}</text>`;
  });
  // Data
  const pts = dims.map((d,i)=>{
    const a=-90+i*(360/N);
    const v=Math.min(fund[d.key]||0,10)/10;
    return `${cx+r*v*Math.cos(rd(a))},${cy+r*v*Math.sin(rd(a))}`;
  }).join(' ');
  svg += `<polygon points="${pts}" fill="${color}" fill-opacity="0.12" stroke="${color}" stroke-width="1.5"/>`;
  return svg;
}

function buildDonutSVG(items, ak, cx, cy, r, inn, lk, cfn, cl) {
  let a=-90, o='';
  items.forEach((it,i)=>{
    const p=it[ak]/100, sa=a, ea=a+p*360, rd=d=>d*Math.PI/180;
    const sx=cx+r*Math.cos(rd(sa)), sy=cy+r*Math.sin(rd(sa));
    const ex=cx+r*Math.cos(rd(ea)), ey=cy+r*Math.sin(rd(ea));
    const ix=cx+inn*Math.cos(rd(ea)), iy=cy+inn*Math.sin(rd(ea));
    const jx=cx+inn*Math.cos(rd(sa)), jy=cy+inn*Math.sin(rd(sa));
    const la=p>0.5?1:0;
    const d=`M${sx} ${sy} A${r} ${r} 0 ${la} 1 ${ex} ${ey} L${ix} ${iy} A${inn} ${inn} 0 ${la} 0 ${jx} ${jy}Z`;
    const mid=sa+p*180, lx=cx+(r+14)*Math.cos(rd(mid)), ly=cy+(r+14)*Math.sin(rd(mid));
    const col=cfn(i);
    o+=`<path d="${d}" fill="${col}" opacity="0.85" stroke="white" stroke-width="2"/>`;
    if(p>0.05) o+=`<text x="${lx}" y="${ly}" fill="${col}" font-size="8" font-family="JetBrains Mono,monospace" font-weight="700" text-anchor="middle" dominant-baseline="middle">${it[lk]}</text>`;
    a=ea;
  });
  o+=`<circle cx="${cx}" cy="${cy}" r="${inn-3}" fill="white"/>`;
  cl.forEach((ln,i)=>o+=`<text x="${cx}" y="${cy+(i-cl.length/2+0.6)*14}" text-anchor="middle" fill="${ln.c}" font-size="${ln.sz||10}" font-family="Manrope,sans-serif" font-weight="${ln.w||400}">${ln.t}</text>`);
  return o;
}

function updateProfile(key, val) {
  const prof = activeProfile();
  if(!prof) return;
  prof[key] = val;
  saveProfiles();
}

function updateWeight(key, val) {
  const prof = activeProfile();
  if(!prof) return;
  prof.weights = prof.weights || {...DEFAULT_WEIGHTS};
  prof.weights[key] = val;
  saveProfiles();
  const tot = Object.values(prof.weights).reduce((s,v)=>s+v,0);
  document.querySelectorAll('[id^="w_"]').forEach(el=>{
    const k = el.id.replace('w_','');
    if(prof.weights[k]!==undefined) el.textContent=prof.weights[k]+'%';
  });
  const badge = document.querySelector('.weight-total');
  if(badge) badge.textContent=tot+'%';
}

function addFundToProfile() {
  const inp = document.getElementById('addFundInput');
  const t = (inp?.value||'').trim().toUpperCase();
  if(!t) return;
  const prof = activeProfile();
  if(!prof || prof.funds.find(f=>f.ticker===t)) return;
  prof.funds.push({ticker:t, name:t});
  saveProfiles();
  if(inp) inp.value='';
  render();
}

function removeFundFromProfile(ticker) {
  const prof = activeProfile();
  if(!prof) return;
  prof.funds = prof.funds.filter(f=>f.ticker!==ticker);
  saveProfiles();
  render();
}

async function renderHistory() {
  const prof = activeProfile();
  if(!prof) return '<div style="padding:40px;text-align:center;color:var(--text3)">No profile active.</div>';

  const runs = await supa.getRuns(prof.id, 20);
  if(!runs?.length) return `<div style="padding:48px;text-align:center;color:var(--text3)">
    <div style="font-size:32px;margin-bottom:12px">📅</div>
    <div style="font-size:14px;font-weight:600;color:var(--text2)">No runs recorded yet</div>
    <p style="font-size:12px;margin-top:8px">Click Run Analysis to execute your first live analysis.</p>
  </div>`;

  const cards = runs.map(run=>{
    const scores = typeof run.model_weights==='string' ? JSON.parse(run.model_weights) : (run.model_weights||[]);
    const sorted = (scores||[]).sort((a,b)=>b.composite-a.composite);
    const top3 = sorted.slice(0,3);
    const date = new Date(run.created_at);
    return `<div class="card fade-in" style="margin-bottom:14px">
      <div class="card-header">
        <div>
          <div style="font-weight:700">${date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
          <div style="font-size:11px;color:var(--text3)">${date.toLocaleTimeString()} · ${run.source} data</div>
        </div>
        <div style="display:flex;gap:10px">
          ${top3.map(f=>`<div style="text-align:center">
            <div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700">${f.ticker}</div>
            <div style="font-size:10px;color:var(--text3)">${(f.composite||0).toFixed(2)}</div>
          </div>`).join('')}
        </div>
      </div>
      ${run.macro_snapshot?`<div style="padding:12px 18px;font-size:11px;color:var(--text2);line-height:1.6;border-top:1px solid var(--border)">${run.macro_snapshot.replace(/MACRO_JSON:.*/s,'').replace('MACRO_SUMMARY:','').trim().slice(0,400)}…</div>`:''}
    </div>`;
  }).join('');

  return `<div style="padding:24px;overflow-y:auto;max-height:calc(100vh - 160px)">
    <div class="label" style="margin-bottom:16px">Run History · ${runs.length} analyses</div>
    ${cards}
  </div>`;
}

// PIPELINE LOADING OVERLAY
// ═══════════════════════════════════════════════════════════════
function renderPipelineOverlay() {
  if(!APP.loading) return '';
  const {step, total, stepName, detail} = APP.pipeline;
  const pct = (step/total)*100;
  const steps = [
    {label:'SEC EDGAR', desc:'Fetch N-PORT holdings for each fund'},
    {label:'Tiingo', desc:'Live NAV + momentum + Sharpe ratio'},
    {label:'Macro Search', desc:'Web search for gold, DXY, rates, global returns'},
    {label:'AI Scoring', desc:'Holdings-weighted fund composite scores'},
  ];
  return `<div style="position:fixed;inset:0;background:rgba(247,245,240,0.92);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center">
    <div class="card fade-in" style="width:460px;padding:32px;box-shadow:var(--shadow-md)">
      <div style="font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;margin-bottom:4px">Running Analysis</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:24px">Fetching live data from SEC EDGAR, Tiingo, and AI scoring engine</div>
      <!-- Progress bar -->
      <div class="pbar-wrap" style="height:6px;margin-bottom:24px">
        <div class="pbar-fill" style="width:${pct}%;background:var(--green)"></div>
      </div>
      <!-- Steps -->
      ${steps.map((s,i)=>{
        const isDone = i < step-1;
        const isActive = i === step-1;
        return `<div class="pipeline-step">
          <div class="pipeline-dot ${isDone?'done':isActive?'active':'pending'}" style="font-size:10px;font-weight:700">
            ${isDone?'✓':isActive?'<div class="spinner" style="width:10px;height:10px;border-width:1.5px"></div>':i+1}
          </div>
          <div>
            <div style="font-size:13px;font-weight:${isActive?700:600};color:${isDone?'var(--green)':isActive?'var(--text)':'var(--text3)'}">${s.label}</div>
            <div style="font-size:11px;color:var(--text3)">${isActive?detail:s.desc}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

async function init() {
  APP.profiles = loadProfiles();
  if(APP.profiles.length) {
    APP.activeProfile = APP.profiles[0].id;
    APP.wizard = false;
    const prof = activeProfile();

    // Preload holdings cache from Supabase so the Holdings tab
    // and fund detail panel work immediately without needing a new run.
    // Schema is row-per-holding: group by fund_ticker to reconstruct arrays.
    try {
      const rows = await supa.get('holdings_cache', '?select=fund_ticker,holding_name,holding_ticker,weight,market_value,asset_type,sector,indexed_at&order=indexed_at.desc');
      if(Array.isArray(rows)) {
        const grouped = {};
        rows.forEach(row => {
          const ft = row.fund_ticker;
          if(!ft) return;
          if(!grouped[ft]) grouped[ft] = { holdings: [], fetchedAt: row.indexed_at };
          grouped[ft].holdings.push({
            name:     row.holding_name || '',
            ticker:   row.holding_ticker || '',
            pctVal:   row.weight || 0,
            valUSD:   row.market_value || 0,
            assetCat: row.asset_type || '',
            sector:   row.sector || '',
            cusip:    '',
          });
        });
        Object.entries(grouped).forEach(([ticker, data]) => {
          const age = (Date.now() - new Date(data.fetchedAt).getTime()) / 86400000;
          if(age < 90 && !APP.holdingsCache[ticker]) {
            APP.holdingsCache[ticker] = data;
          }
        });
      }
    } catch(e) { /* non-fatal */ }

    APP.funds = buildComposite(prof.funds, null, null, prof.weights);
    APP.selectedFund = APP.funds[0]?.ticker;
  }
  render();
}

init();
</script>
</body>
</html>
