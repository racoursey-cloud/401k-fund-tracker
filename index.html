<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FundLens — 401K Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F5F0;--surface:#FFFFFF;--surface2:#F0EDE8;--border:#E2DDD8;--border2:#D0CAC3;
  --text:#111418;--text2:#5C6370;--text3:#9AA0AD;
  --green:#059669;--green-bg:#ECFDF5;--green-bd:#A7F3D0;
  --amber:#B45309;--amber-bg:#FFFBEB;--amber-bd:#FDE68A;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;--blue-bd:#BFDBFE;
  --red:#DC2626;--red-bg:#FEF2F2;--red-bd:#FCA5A5;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-bd:#C4B5FD;
  --accent:#1D4ED8;--radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Manrope',sans-serif;font-weight:600;font-size:13px;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:var(--text);color:#fff}.btn-primary:hover{background:#333}.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#047857}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-bd)}.btn-danger:hover{background:var(--red-bg)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-body{padding:22px}
input[type="text"],input[type="number"],textarea,select{font-family:'Manrope',sans-serif;font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 12px;outline:none;transition:border-color 0.15s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.tab{padding:11px 16px;font-size:12px;font-weight:600;letter-spacing:0.3px;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'Manrope',sans-serif;transition:color 0.15s;white-space:nowrap}
.tab:hover{color:var(--text2)}.tab.on{color:var(--text);border-bottom-color:var(--text)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.5px;font-family:'JetBrains Mono',monospace}
.t1{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.t2{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.t3{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.t4{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.t5{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.score-xl{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;line-height:1}
.score-lg{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}
.score-md{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}
.pos{color:var(--green)}.neg{color:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
.pbar-wrap{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase}
.note{font-size:11px;color:var(--text3);line-height:1.5}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:680px){.grid-2,.grid-3{grid-template-columns:1fr}}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:0.8px;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--bg);vertical-align:middle}
.data-table tr:hover td{background:var(--surface2)}
.data-table tr.selected td{background:var(--blue-bg)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn 0.25s ease both}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.app-logo{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;letter-spacing:-0.3px}
.app-logo span{color:var(--green)}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.metric-label{font-size:10px;font-weight:700;letter-spacing:0.8px;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.metric-value{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px}
.pipeline-step{display:flex;gap:10px;padding:10px 0;align-items:flex-start}
.pipeline-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:10px;font-weight:700}
.pipeline-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.pipeline-dot.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pipeline-dot.pending{background:var(--surface);border-color:var(--border)}
.wizard-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:var(--bg)}
.wizard-card{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-md);overflow:hidden}
.wizard-header{padding:32px 36px 24px;border-bottom:1px solid var(--border);background:var(--bg)}
.wizard-body{padding:32px 36px}
.wizard-footer{padding:20px 36px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.step-dots{display:flex;gap:6px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background 0.2s}
.step-dot.on{background:var(--text)}
.fund-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600}
.fund-chip button{background:none;border:none;cursor:pointer;color:var(--text3);padding:0;font-size:14px;line-height:1;transition:color 0.1s}
.fund-chip button:hover{color:var(--red)}
.alert-banner{background:var(--amber-bg);border-bottom:1px solid var(--amber-bd);padding:8px 24px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* Sector traffic light */
.sector-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.sector-win{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.sector-neu{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.sector-los{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
/* Thesis prose */
.thesis-prose{font-size:15px;line-height:1.85;color:var(--text2)}
.thesis-prose p{margin-bottom:16px}
.thesis-prose strong{color:var(--text);font-weight:700}
.thesis-bullets{list-style:none;padding:0;margin:0}
.thesis-bullets li{font-size:14px;line-height:1.7;color:var(--text2);padding:6px 0 6px 22px;position:relative;border-bottom:1px solid var(--bg)}
.thesis-bullets li:last-child{border-bottom:none}
.thesis-bullets li::before{content:'•';position:absolute;left:4px;color:var(--accent);font-weight:900;font-size:16px}
.thesis-section-label{font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;margin-top:4px}
/* IC tracker */
.ic-good{color:var(--green)}.ic-ok{color:var(--amber)}.ic-bad{color:var(--red)}
/* Breakaway glow */
.breakaway-row td{background:linear-gradient(90deg,var(--green-bg) 0%,transparent 100%) !important}
.src-live{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.src-seed{background:#F1F5F9;color:#64748B;border:1px solid #CBD5E1;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.src-partial{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.radar-wrap{display:flex;justify-content:center}
.donut-wrap{display:flex;justify-content:center;align-items:flex-start;gap:20px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const DEFAULT_FUNDS = [
  {ticker:'PRPFX',name:'Permanent Portfolio I'},
  {ticker:'WFPRX',name:'Allspring Special Mid Cap Value'},
  {ticker:'VFWAX',name:'Vanguard FTSE All-World ex-US'},
  {ticker:'QFVRX',name:'Pear Tree Polaris Foreign Value'},
  {ticker:'MADFX',name:'Matrix Advisors Dividend Fund'},
  {ticker:'VADFX',name:'Invesco Equal-Weight S&P 500'},
  {ticker:'RNWGX',name:'American Funds New World R6'},
  {ticker:'OIBIX',name:'Invesco International Bond R6'},
  {ticker:'RTRIX',name:'Royce Small-Cap Total Return'},
  {ticker:'DRRYX',name:'BNY Mellon Global Real Return'},
  {ticker:'VWIGX',name:'Vanguard International Growth'},
  {ticker:'TGEPX',name:'TCW Emerging Markets Income'},
  {ticker:'BPLBX',name:'BlackRock Inflation Protected Bond'},
  {ticker:'CFSTX',name:'Commerce Short Term Government'},
  {ticker:'MWTSX',name:'MetWest Total Return Bond'},
  {ticker:'FXAIX',name:'Fidelity 500 Index Fund'},
  {ticker:'FDRXX',name:'Fidelity Government Cash Reserves'},
  {ticker:'ADAXX',name:'Invesco Government Money Market'},
  {ticker:'WEGRX',name:'Allspring Emerging Growth R6'},
  {ticker:'BGHIX',name:'BrandywineGLOBAL High Yield I'},
  {ticker:'HRAUX',name:'Carillon Eagle Mid Cap Growth'},
  {ticker:'FSPGX',name:'Fidelity Large Cap Growth Index'},
];

// 11 GICS sectors with SPDR ETF proxies for momentum calculation
const GICS_SECTORS = {
  'Technology':             {etf:'XLK', color:'#1D4ED8'},
  'Financials':             {etf:'XLF', color:'#059669'},
  'Healthcare':             {etf:'XLV', color:'#DC2626'},
  'Consumer Discretionary': {etf:'XLY', color:'#D97706'},
  'Consumer Staples':       {etf:'XLP', color:'#7C3AED'},
  'Energy':                 {etf:'XLE', color:'#B45309'},
  'Industrials':            {etf:'XLI', color:'#0891B2'},
  'Materials':              {etf:'XLB', color:'#65A30D'},
  'Utilities':              {etf:'XLU', color:'#6B7280'},
  'Real Estate':            {etf:'XLRE',color:'#EC4899'},
  'Communication Services': {etf:'XLC', color:'#8B5CF6'},
};

// Key FRED series for macro intelligence
const FRED_SERIES = {
  DFF:           'Fed Funds Rate',
  T10Y2Y:        '10Y-2Y Yield Curve',
  CPIAUCSL:      'CPI YoY',
  UNRATE:        'Unemployment Rate',
  BAMLH0A0HYM2:  'HY Credit Spread',
  // GOLDAMGBD228NLBM was discontinued by FRED — gold now fetched from Twelvedata in buildWorldIntelligence()
  WTISPLC:       'WTI Crude',
  NAPM:          'Manufacturing PMI',
  UMCSENT:       'Consumer Sentiment',  // replaces NMFSL (ISM Services PMI — not available on FRED)
  T10YIE:        'Breakeven Inflation 10Y',
  DTWEXBGS:      'USD Broad Index',
};

const MONEY_MARKET_FUNDS = new Set(['FDRXX','ADAXX']);

const ALERTS = {
  PRPFX:'Single-manager risk (Cuggino)',QFVRX:'Fee waiver expires 7/31/2026',
  RNWGX:'Benchmark changed 1/1/2026',VWIGX:'Beta 1.34; Baillie Gifford modifying',
  WFPRX:'2025 underperformed benchmark 4.82pp',OIBIX:'New manager Block added 2025',
  MADFX:'AUM ~$55M viability concern',TGEPX:'Expense cap expired Feb 2026',
  VADFX:'Process downgraded Jul 2024',BPLBX:'New lead PM; 227% turnover',
  RTRIX:'Founder Royce transitioning out',DRRYX:'PM overhaul - Morningstar Under Review',
  MWTSX:'Leadership transition Nov 2025',CFSTX:'AUM $29.4M viability risk',
  ADAXX:'Closed to new investors May 2020',BGHIX:'Lead PM departed Jul 2025',
  WEGRX:'Fee waiver expires 8/31/2026',HRAUX:'12% cap gain distribution early 2026',
};

// Seed scores — fallback when live pipeline fails
const SEED = {
  PRPFX:{composite:7.8,roi:4.2,tier:'STRONG'},WFPRX:{composite:6.1,roi:1.8,tier:'NEUTRAL'},
  VFWAX:{composite:7.2,roi:4.5,tier:'STRONG'},QFVRX:{composite:6.4,roi:3.1,tier:'NEUTRAL'},
  MADFX:{composite:5.5,roi:1.5,tier:'NEUTRAL'},VADFX:{composite:4.8,roi:0.8,tier:'NEUTRAL'},
  RNWGX:{composite:6.8,roi:3.8,tier:'NEUTRAL'},OIBIX:{composite:5.2,roi:1.2,tier:'NEUTRAL'},
  RTRIX:{composite:4.1,roi:0.5,tier:'NEUTRAL'},DRRYX:{composite:3.8,roi:-0.5,tier:'NEUTRAL'},
  VWIGX:{composite:6.5,roi:3.2,tier:'NEUTRAL'},TGEPX:{composite:5.8,roi:2.0,tier:'NEUTRAL'},
  BPLBX:{composite:5.0,roi:1.0,tier:'NEUTRAL'},CFSTX:{composite:4.5,roi:0.6,tier:'NEUTRAL'},
  MWTSX:{composite:4.2,roi:0.8,tier:'NEUTRAL'},FXAIX:{composite:4.5,roi:-0.5,tier:'NEUTRAL'},
  FDRXX:{composite:3.5,roi:0.85,tier:'NEUTRAL'},ADAXX:{composite:3.4,roi:0.87,tier:'NEUTRAL'},
  WEGRX:{composite:3.2,roi:-2.5,tier:'NEUTRAL'},BGHIX:{composite:3.5,roi:-1.0,tier:'NEUTRAL'},
  HRAUX:{composite:3.0,roi:-2.0,tier:'NEUTRAL'},FSPGX:{composite:3.8,roi:-1.5,tier:'NEUTRAL'},
};

// Five independent scoring factors — all carry real signal.
// holdingsCoverage replaces returnScore (which double-counted worldThesis).
// managerQuality now uses actual Claude-assessed scores, not a hardcoded 5.0.
// Weights are auto-normalized at runtime — they don't have to sum to exactly 100 here,
// but 100 is the target users will see in Settings.
//
// Blueprint default weights (from v3 research):
//   Trend (worldThesis)       35% — primary signal: thesis × holdings
//   Foundations (managerQuality) 22% — management quality & company fundamentals
//   Room to Run (riskAdj)     18% — Sharpe ratio, return quality vs volatility
//   Safety Net (holdingsCoverage) 15% — how much of the fund we can actually see
//   Market Feel (momentum)    10% — trailing price momentum, last signal priority
const DEFAULT_WEIGHTS = {worldThesis:35, managerQuality:22, riskAdj:18, holdingsCoverage:15, momentum:10};

// Plain-English display names for the 5 scoring factors.
// Internal keys stay as-is throughout the codebase — only the UI uses these labels.
const FACTOR_LABELS = {
  worldThesis:      {label:'Follow the Trend',    desc:'How well this fund is positioned for current world conditions — sector outlook × actual holdings'},
  managerQuality:   {label:'Foundations',          desc:'Management team quality, fund stability, parent company reputation, and fee structure'},
  riskAdj:          {label:'Room to Run',          desc:'Return quality relative to risk (Sharpe ratio) — how much upside vs. volatility'},
  holdingsCoverage: {label:'Safety Net',           desc:'How much of this fund\'s value we can analyze — low coverage means less confident scores'},
  momentum:         {label:'Market Feel',          desc:'Recent price trend (63-day momentum) — the market\'s current vote on this fund'},
};

// World data freshness: how many minutes before FRED+GDELT is considered stale.
// Steps 1 (World Intelligence) and 3 (Strategy Formation) are skipped when cache is valid.
// Configurable in Settings — stored in profile.worldDataTTL.
const DEFAULT_WORLD_TTL_MINS = 60;

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let APP = {
  wizard:true, wizardStep:1,
  profiles:[], activeProfile:null,
  funds:[],
  source:'seed', loading:false,
  pipeline:{step:0, total:6, detail:'', stepName:''},
  lastRun:null,
  errors:[],          // pipeline errors surfaced in UI
  weightWarning:null, // non-null when weights were auto-normalized this run
  // World intelligence
  worldData:null,        // FRED + GDELT raw data
  worldDataFetchedAt:null, // ISO timestamp of last successful world data fetch
  sectorScores:null,     // {Technology:{score,reason}, ...}
  investmentThesis:null, // Full thesis object from Claude
  tiingoStale:false,     // true if Tiingo served cached data due to rate limit
  tiingoCache:{},        // ticker → {data, cachedAt, marketWasClosed} — persists across runs when mkt closed
  dominantTheme:null,
  dataQuality:null,      // {fredOk,gdeltOk,fredSeriesCount,headlineCount,staleness,assessedAt}
  // Delta tracking — loaded from localStorage, updated each run
  prevSectorScores:null,   // sector scores from previous run (for Thesis delta narrative)
  prevFundScores:{},       // ticker → composite from previous run (for Rankings arrows)
  prevRunAt:null,          // ISO timestamp of previous run
  // Manager quality
  managerScores:{},        // ticker → {score, reasoning, cachedAt}
  // Prediction tracking
  currentCycleId:null,
  // History cache (avoid re-fetching Supabase on every History tab click)
  historyCache:null,       // {cycles, fetchedAt}
  // UI
  tab:'rank', selectedFund:null,
  showHoldingsFor:null,
  holdingsCache:{},
  sectorMappingCache:{},  // ticker → sector (in-memory, also Supabase)
  diversificationMode:false, // portfolio tab toggle
  applyLens:false,           // opt-in per run — applies marketLens keywords to Claude prompt
};

// ═══════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════
const LS = {
  get:k=>{try{return JSON.parse(localStorage.getItem('fl3_'+k))}catch(e){return null}},
  set:(k,v)=>{try{localStorage.setItem('fl3_'+k,JSON.stringify(v))}catch(e){}},
  del:k=>localStorage.removeItem('fl3_'+k),
};
function saveProfiles(){LS.set('profiles',APP.profiles)}
function loadProfiles(){return LS.get('profiles')||[]}
function activeProfile(){return APP.profiles.find(p=>p.id===APP.activeProfile)||null}
function getFunds(){return activeProfile()?.funds||DEFAULT_FUNDS}
function getWeights(){return activeProfile()?.weights||DEFAULT_WEIGHTS}
// Returns weights scaled so they always sum to exactly 1.0 (for use in composite formula).
// If the user's weights don't sum to 100, we normalize silently — the UI will show a warning.
function getNormalizedWeights(){
  const W=getWeights();
  const total=Object.values(W).reduce((s,v)=>s+v,0);
  if(total===0)return Object.fromEntries(Object.keys(W).map(k=>[k,1/Object.keys(W).length]));
  return Object.fromEntries(Object.entries(W).map(([k,v])=>[k,v/total]));
}
// Returns the world data TTL in milliseconds from the active profile (or default).
function getWorldDataTTLms(){
  const mins=activeProfile()?.worldDataTTL||DEFAULT_WORLD_TTL_MINS;
  return mins*60*1000;
}
// Returns true if the cached world data is still within its TTL.
function worldDataIsFresh(){
  if(!APP.worldDataFetchedAt)return false;
  return(Date.now()-new Date(APP.worldDataFetchedAt).getTime())<getWorldDataTTLms();
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE CLIENT
// ═══════════════════════════════════════════════════════════════
const supa = {
  h:{get(table,params=''){return fetch(`/api/supabase/${table}${params}`).then(r=>r.ok?r.json():null).catch(()=>null)},
     post(table,body,prefer='return=representation'){return fetch(`/api/supabase/${table}`,{method:'POST',headers:{'Content-Type':'application/json','Prefer':prefer},body:JSON.stringify(body)}).then(r=>{if(!r.ok){r.text().then(t=>console.error('Supabase POST failed:',table,r.status,t.slice(0,200)));return null;}return r.json().catch(()=>null);}).catch(e=>{console.error('Supabase POST error:',table,e.message);return null;})},
     del(table,params=''){return fetch(`/api/supabase/${table}${params}`,{method:'DELETE',headers:{'Prefer':'return=minimal'}}).then(r=>r.ok).catch(()=>false)}
  },
  async getHoldings(ticker){
    const rows=await this.h.get('holdings_cache',`?fund_ticker=eq.${ticker}&select=*&order=weight.desc`);
    if(!rows?.length)return null;
    return{holdings:rows.map(r=>({name:r.holding_name||'',ticker:r.holding_ticker||'',pctVal:r.weight||0,valUSD:r.market_value||0,assetCat:r.asset_type||'',sector:r.sector||'',cusip:''})),fetchedAt:rows[0].indexed_at};
  },
  async saveHoldings(ticker,holdings,fundName){
    // Try delete first; if it fails (503/RLS), proceed with upsert anyway
    const deleted=await this.h.del('holdings_cache',`?fund_ticker=eq.${ticker}`);
    if(!deleted){
      console.warn(`holdings_cache DELETE failed for ${ticker} — will attempt upsert`);
      await new Promise(r=>setTimeout(r,500)); // small delay before retry
    }

// In-memory cache for the MF tickers file (loaded once per session)
let _mfTickersCache = null;

async function getMFTickersCIK(ticker){
  // Load the SEC mutual fund tickers file once and cache in memory
  if(!_mfTickersCache){
    try{
      const r=await fetch('/api/www4sec/files/company_tickers_mf.json',{signal:fetchSignal(15000)});
      if(r.ok){
        const data=await r.json();
        // Build ticker→{cik,title} map from the array-of-arrays format
        _mfTickersCache={};
        Object.values(data).forEach(row=>{
          // Each row: {cik_str, ticker, title, exchange}
          if(row.ticker)_mfTickersCache[row.ticker.toUpperCase()]={cik:String(row.cik_str),title:row.title};
        });
        console.log(`SEC MF tickers loaded: ${Object.keys(_mfTickersCache).length} funds`);
      }
    }catch(e){
      console.warn('MF tickers file failed to load:',e.message);
      _mfTickersCache={};
    }
  }
  return _mfTickersCache[ticker.toUpperCase()]||null;
}

async function fetchEdgarHoldings(ticker,fundName){
  try{
    // ── Strategy 1: Direct CIK from company_tickers_mf.json (most reliable) ──
    const mfEntry=await getMFTickersCIK(ticker);
    if(mfEntry){
      console.log(`EDGAR ${ticker}: CIK ${mfEntry.cik} from MF tickers file`);
      const result=await fetchNportByCIK(mfEntry.cik,ticker);
      if(result?.length)return result;
    }

    // ── Strategy 2: EFTS full-text search fallback ──
    console.log(`EDGAR ${ticker}: MF tickers miss — trying EFTS search`);
    const query=encodeURIComponent(`"${ticker}"`);
    const res=await fetch(`/api/efts/LATEST/search-index?q=${query}&forms=NPORT-P`,{signal:fetchSignal(12000)});
    if(!res.ok)return null;
    const data=await res.json();
    const hits=data?.hits?.hits;
    if(!hits?.length){
      // Try with fund name words as last resort
      const nameQuery=encodeURIComponent(fundName.split(' ').slice(0,3).join(' '));
      const res2=await fetch(`/api/efts/LATEST/search-index?q=${nameQuery}&forms=NPORT-P`,{signal:fetchSignal(12000)});
      if(!res2.ok)return null;
      const data2=await res2.json();
      const hits2=data2?.hits?.hits;
      if(!hits2?.length)return null;
      const src2=hits2[0]._source;
      const cik2=src2.ciks?.[0]?.replace(/^0+/,'');
      if(!cik2)return null;
      const adsh2=src2.adsh;
      if(!adsh2)return null;
      return await fetchNportByAccession(cik2,adsh2,ticker);
    }
    const src=hits[0]._source;
    const rawCik=src.ciks?.[0];
    if(!rawCik)return null;
    const cik=rawCik.replace(/^0+/,'');
    const adsh=src.adsh;
    if(adsh)return await fetchNportByAccession(cik,adsh,ticker);
    return await fetchNportByCIK(cik,ticker);
  }catch(e){console.warn(`EDGAR search failed for ${ticker}:`,e.message);return null}
}

// Fetch the latest NPORT-P filing for a CIK via the submissions API
async function fetchNportByCIK(cik,ticker){
  try{
    const padded=String(cik).padStart(10,'0');
    const subRes=await fetch(`/api/edgar/submissions/CIK${padded}.json`,{signal:fetchSignal(15000)});
    if(!subRes.ok)return null;
    const subData=await subRes.json();
    const filings=subData.filings?.recent;
    if(!filings?.form)return null;
    let latestIdx=-1;
    filings.form.forEach((form,i)=>{
      if(form==='NPORT-P'){if(latestIdx===-1||filings.filingDate[i]>filings.filingDate[latestIdx])latestIdx=i}
    });
    if(latestIdx===-1)return null;
    const accNo=filings.accessionNumber[latestIdx];
    console.log(`EDGAR ${ticker}: CIK ${cik} → NPORT-P accession ${accNo} (filed ${filings.filingDate[latestIdx]})`);
    return await fetchNportByAccession(cik,accNo,ticker);
  }catch(e){console.warn(`fetchNportByCIK failed for ${ticker}:`,e.message);return null}
}
async function fetchNportByAccession(cik,accNo,ticker){
  try{
    const accNoDashes=accNo.replace(/-/g,'');
    const indexUrl=`/api/www4sec/Archives/edgar/data/${cik}/${accNoDashes}/`;
    const idxRes=await fetch(indexUrl,{signal:fetchSignal(10000)});
    if(!idxRes.ok)return null;
    const idxHtml=await idxRes.text();
    
    // Find the primary NPORT XML — prefer files with 'primary' or 'nport' in the name,
    // or the first .xml that is NOT the index file itself
    const xmlMatches=[...idxHtml.matchAll(/href="([^"]+\.xml)"/gi)].map(m=>m[1]);
    if(!xmlMatches.length)return null;
    
    // Prefer nport/primary doc; fall back to first xml
    const xmlFile=(
      xmlMatches.find(f=>f.toLowerCase().includes('nport'))||
      xmlMatches.find(f=>f.toLowerCase().includes('primary'))||
      xmlMatches.find(f=>!f.toLowerCase().includes('index'))||
      xmlMatches[0]
    );
    
    const xmlUrl=xmlFile.startsWith('/')?`/api/www4sec${xmlFile}`:`${indexUrl}${xmlFile}`;
    const xmlRes=await fetch(xmlUrl,{signal:fetchSignal(20000)});
    if(!xmlRes.ok)return null;
    return parseNportXML(await xmlRes.text(),ticker);
  }catch(e){console.warn(`fetchNportByAccession failed for ${ticker}:`,e.message);return null}
}
// Parse an NPORT-P XML filing into a sorted holdings array.
// Returns null if no holdings found or XML is unparseable.
// NOTE: pctVal values from SEC are percentages (e.g. 5.2 = 5.2%).
// Normalization only triggers when rawTotal > 110, which handles rare cases
// where a fund reports individual share-class weights that sum > 100.
function parseNportXML(xmlText, ticker){
  try{
    const doc=new DOMParser().parseFromString(xmlText,'application/xml');
    const holdings=[];
    doc.querySelectorAll('invstOrSec').forEach(el=>{
      const get=tag=>el.querySelector(tag)?.textContent?.trim()||'';
      const pctVal=parseFloat(get('pctVal'))||0;
      if(pctVal<=0)return;
      const tickerEl=el.querySelector('identifiers ticker value')||el.querySelector('ticker value');
      holdings.push({name:get('name'),ticker:tickerEl?tickerEl.textContent.trim():'',cusip:get('cusip'),pctVal,valUSD:parseFloat(get('valUSD'))||0,assetCat:get('assetCat'),country:get('invCountry'),sector:''});
    });
    holdings.sort((a,b)=>b.pctVal-a.pctVal);
    const rawTotal=holdings.reduce((s,h)=>s+h.pctVal,0);
    // Only normalize when rawTotal is clearly wrong (share-class double-counting)
    if(rawTotal>110)holdings.forEach(h=>{h.pctVal=+(h.pctVal/rawTotal*100).toFixed(4)});
    if(holdings.length)console.log(`NPORT parsed for ${ticker||'unknown'}: ${holdings.length} holdings, raw total ${rawTotal.toFixed(1)}%`);
    return holdings.length?holdings:null;
  }catch(e){console.warn(`parseNportXML failed${ticker?' for '+ticker:''}:`,e.message);return null}
}

// TIINGO — NAV + Momentum + Sharpe
// ═══════════════════════════════════════════════════════════════
async function fetchTiingo(ticker){
  // If market is closed and we have a same-session cache hit, skip the network call.
  // The cache is keyed by ticker and invalidated at start of each new run (see runPipeline).
  const cached=APP.tiingoCache[ticker];
  if(cached&&!APP.marketOpen){
    console.log(`Tiingo ${ticker}: market closed — using cached close (${cached.cachedAt})`);
    APP.tiingoStale=true;
    return cached.data;
  }

  const end=new Date();
  const start=new Date();start.setFullYear(start.getFullYear()-1);
  const fmt=d=>d.toISOString().split('T')[0];
  try{
    const r=await fetch(`/api/tiingo/tiingo/daily/${ticker}/prices?startDate=${fmt(start)}&endDate=${fmt(end)}`,{signal:fetchSignal(10000)});
    if(r.status===429){APP.tiingoStale=true;return cached?.data||null;} // rate-limited — fall back to cache
    if(!r.ok)return cached?.data||null;
    // Server returned cached data (X-Tiingo-Cache: STALE or HIT from previous day)
    const cacheHeader=r.headers.get('X-Tiingo-Cache');
    if(cacheHeader==='STALE')APP.tiingoStale=true;
    const data=await r.json();
    if(!Array.isArray(data)||data.length<20)return cached?.data||null;
    const prices=data.map(d=>d.adjClose||d.close).filter(Boolean);
    const latest=prices[prices.length-1];
    const p63=prices[Math.max(0,prices.length-64)];
    const p21=prices[Math.max(0,prices.length-22)];
    const mom63=((latest-p63)/p63)*100;
    const mom21=((latest-p21)/p21)*100;
    const momentum=Math.min(10,Math.max(0,5+mom63*0.35+mom21*0.15));
    const rets=[];
    for(let i=1;i<prices.length;i++)rets.push((prices[i]-prices[i-1])/prices[i-1]);
    const mean=rets.reduce((s,r)=>s+r,0)/rets.length*252;
    const variance=rets.reduce((s,r)=>s+Math.pow(r-mean/252,2),0)/rets.length;
    const std=Math.sqrt(variance)*Math.sqrt(252);
    const sharpe=std>0?(mean-0.043)/std:0;
    const riskAdj=Math.min(10,Math.max(0,5+sharpe*1.8));
    const result={momentum:+momentum.toFixed(2),riskAdj:+riskAdj.toFixed(2),nav:latest,mom63:+mom63.toFixed(2),mom21:+mom21.toFixed(2)};
    // Store in session cache so after-hours re-runs skip the fetch
    APP.tiingoCache[ticker]={data:result,cachedAt:new Date().toLocaleTimeString(),marketWasClosed:!APP.marketOpen};
    return result;
  }catch(e){return cached?.data||null;}
}

async function fetchFREDSeries(seriesId){

    if(!r.ok){

async function fetchGDELT(query,maxRecords=8){
  try{
    const q=encodeURIComponent(query);
    const r=await fetch(`/api/gdelt?query=${q}&mode=artlist&maxrecords=${maxRecords}&format=json`,{signal:fetchSignal(10000)});
    if(!r.ok){

      console.error(`GDELT "${query.slice(0,40)}…": HTTP ${r.status} — ${txt.slice(0,120)}`);
      return[];

    const data=await r.json();

    return titles;
  }catch(e){
    console.error(`GDELT fetch error:`,e.message);
    return[];
  }
}

// ── Adaptive GDELT query builder ────────────────────────────────
// Reads FRED signals and sector momentum divergence to generate
// targeted news queries rather than fixed static themes.
//
// Returns exactly 4 [query, maxRecords] pairs:
//   [0] Primary FRED macro regime signal
//   [1] Secondary FRED signal or geopolitical wildcard
//   [2] Most momentum-uncertain sector (21d vs 63d diverging most)
//   [3] Second most uncertain sector
//
function buildGDELTQueries(fredData){
  const f = fredData || {};
  const yr = new Date().getFullYear();

  // ── 1. Read dominant FRED signals ────────────────────────────
  // Each signal returns {query, label, priority} when triggered.
  const signals = [];

  const dxy   = f.DTWEXBGS;
  const gold  = f._goldUSD ? parseFloat(f._goldUSD) : null; // from Twelvedata
  const oil   = f.WTISPLC;
  const hyCrd = f.BAMLH0A0HYM2;
  const yldCv = f.T10Y2Y;
  const fed   = f.DFF;
  const infBE = f.T10YIE;
  const mfgPM = f.NAPM;
  const svcPM = f.UMCSENT; // Consumer Sentiment (replaces unavailable ISM Services PMI)

  // Dollar weakness → international rotation story
  if(dxy !== null && dxy < 100)
    signals.push({priority:9, label:'Weak USD / intl rotation',
      query:`US dollar weakness international markets rotation emerging markets ${yr}`});
  // Dollar strength → risk-off, repatriation story
  else if(dxy !== null && dxy > 108)
    signals.push({priority:7, label:'Strong USD / EM pressure',
      query:`US dollar strength emerging markets currency pressure global ${yr}`});

  // Gold surge → safe haven demand, uncertainty, inflation hedge
  if(gold !== null && gold > 3000)
    signals.push({priority:9, label:'Gold surge / safe haven',
      query:`gold safe haven geopolitical uncertainty inflation hedge central banks ${yr}`});
  else if(gold !== null && gold > 2500)
    signals.push({priority:6, label:'Elevated gold',
      query:`gold price inflation uncertainty Federal Reserve monetary policy ${yr}`});

  // High yield credit spreads → credit stress, default risk
  if(hyCrd !== null && hyCrd > 5.0)
    signals.push({priority:10, label:'Credit stress',
      query:`high yield credit spreads corporate bonds default risk recession ${yr}`});
  else if(hyCrd !== null && hyCrd > 3.5)
    signals.push({priority:7, label:'Widening credit spreads',
      query:`corporate credit spreads widening lending conditions financial stress ${yr}`});

  // Inverted yield curve → recession risk
  if(yldCv !== null && yldCv < -0.2)
    signals.push({priority:8, label:'Inverted yield curve',
      query:`yield curve inversion recession risk economic slowdown bank lending ${yr}`});

  // High rates → rate-sensitive sector pressure
  if(fed !== null && fed > 4.5)
    signals.push({priority:7, label:'High Fed funds rate',
      query:`Federal Reserve interest rates monetary policy tightening inflation ${yr}`});
  // Rate cuts → risk-on
  else if(fed !== null && fed < 3.5)
    signals.push({priority:8, label:'Easing cycle',
      query:`Federal Reserve rate cuts easing economic stimulus markets ${yr}`});

  // Breakeven inflation elevated → inflation trade
  if(infBE !== null && infBE > 2.7)
    signals.push({priority:8, label:'Elevated breakeven inflation',
      query:`inflation tariffs supply chain price pressures consumer spending ${yr}`});

  // Oil high → energy geopolitics
  if(oil !== null && oil > 85)
    signals.push({priority:7, label:'High oil prices',
      query:`crude oil OPEC energy supply geopolitical Middle East disruption ${yr}`});
  // Oil low → deflation / demand concern
  else if(oil !== null && oil < 55)
    signals.push({priority:6, label:'Low oil / demand concern',
      query:`oil demand slowdown China economy global growth industrial activity ${yr}`});

  // Manufacturing PMI contraction
  if(mfgPM !== null && mfgPM < 49)
    signals.push({priority:7, label:'Manufacturing contraction',
      query:`manufacturing contraction industrial orders trade tariffs supply chain ${yr}`});

  // Consumer Sentiment weak (replaces Services PMI — scale ~50-100, low = pessimistic consumers)
  if(svcPM !== null && svcPM < 65)
    signals.push({priority:8, label:'Weak consumer sentiment',
      query:`consumer confidence spending weakness recession fears consumer discretionary ${yr}`});

  // Always include a geopolitical wildcard if signals are sparse
  signals.push({priority:3, label:'Geopolitical baseline',
    query:`geopolitical risk trade sanctions conflict global markets ${yr}`});
  signals.push({priority:3, label:'Trade policy baseline',
    query:`US tariffs trade war China Europe global supply chain ${yr}`});

  // Sort by priority descending, deduplicate by taking top 2
  signals.sort((a,b) => b.priority - a.priority);
  const top2 = signals.slice(0,2);
  console.log('GDELT macro signals selected:',
    top2.map(s=>`"${s.label}" (priority ${s.priority})`).join(', '));

  // ── 2. Static orthogonal queries ─────────────────────────────
  // Queries 3 & 4 are deliberately NOT derived from momentum or price data.
  // GDELT's unique value is surfacing things that haven't yet moved prices —
  // policy announcements, supply chain shocks, geopolitical events.
  // Using price-derived signals to select these queries would amplify data
  // already flowing into the scoring engine, not add independent signal.
  //
  // Query 3: Trade/tariff/earnings guidance — policy risk that shows up in
  //   news before it appears in prices or fundamentals.
  // Query 4: Geopolitical/event risk — purely event-driven shocks orthogonal
  //   to any quantitative signal the model already has.
  const q3 = [`trade policy tariffs supply chain corporate earnings guidance ${yr}`, 7];
  const q4 = [`geopolitical conflict energy shipping lanes sanctions military ${yr}`, 7];

  console.log('GDELT queries finalised:',
    [top2[0], top2[1]].map(s=>`"${s.label}"`).join(', '),
    '+ 2 static orthogonal queries');

  return [
    [top2[0].query, 8],
    [top2[1].query, 8],
    q3,
    q4,
  ];
}

// NOTE: sectorMomentum is NOT used inside this function — GDELT queries are built
// from FRED signals only. The parameter was removed to avoid confusion.
async function buildWorldIntelligence(setPipelineDetail){
  setPipelineDetail('Fetching FRED economic data + live gold price + Treasury yields...');
  console.group('Step 1 — World Intelligence');
  
  // Fetch FRED series sequentially — parallel requests overwhelm the Railway proxy
  // and result in silent 0/9 failures. Sequential adds ~5s but gets real data.
  const fredKeys=Object.keys(FRED_SERIES);
  const fredData={};
  for(let i=0;i<fredKeys.length;i++){
    const k=fredKeys[i];
    setPipelineDetail(`FRED (${i+1}/${fredKeys.length}): ${FRED_SERIES[k]}...`);
    fredData[k]=await fetchFREDSeries(k);
  }

  // Gold price — FRED discontinued GOLDAMGBD228NLBM; fetch live from Twelvedata instead
  try{
    const gr=await fetch('/api/twelvedata/quote?symbol=XAU%2FUSD');
    const gd=await gr.json();
    if(gd?.close){fredData._goldUSD=parseFloat(gd.close).toFixed(2);console.log(`Gold (Twelvedata): $${fredData._goldUSD}`);}
  }catch(e){console.warn('Gold fetch failed:',e.message);}

  // Treasury yield curve — server now returns parsed JSON (fixed from raw CSV)
  try{
    const tr=await fetch('/api/treasury');
    const td=await tr.json();
    const row=td?.rows?.[0]; // newest row first
    if(row){
      if(row['2 Yr'])  fredData._t2y=parseFloat(row['2 Yr']);
      if(row['10 Yr']) fredData._t10y=parseFloat(row['10 Yr']);
      if(row['30 Yr']) fredData._t30y=parseFloat(row['30 Yr']);
      console.log(`Treasury (live ${td.updated}): 2Y=${fredData._t2y}% 10Y=${fredData._t10y}% 30Y=${fredData._t30y}%`);
    }
  }catch(e){console.warn('Treasury yield curve fetch failed:',e.message);}
  
  const fredAvailable=Object.values(fredData).filter(v=>v!==null).length;
  console.log(`FRED total: ${fredAvailable}/${fredKeys.length} series fetched successfully`);
  if(fredAvailable===0) console.error('FRED: 0 series fetched — check FRED_KEY in Railway /health endpoint');
  
  // Build adaptive GDELT queries from FRED signals + sector momentum divergence
  const gdeltQueries = buildGDELTQueries(fredData);
  
  const gdeltResults=[];
  for(let i=0;i<gdeltQueries.length;i++){
    setPipelineDetail(`GDELT query ${i+1}/${gdeltQueries.length}: ${gdeltQueries[i][0].slice(0,50)}...`);
    gdeltResults.push(await fetchGDELT(...gdeltQueries[i]));
  }
  
  const allHeadlines=[...gdeltResults[0],...gdeltResults[1],...gdeltResults[2],...gdeltResults[3]]
    .filter((h,i,arr)=>arr.indexOf(h)===i).slice(0,28);
  console.log(`GDELT total: ${allHeadlines.length} unique headlines collected`);
  if(allHeadlines.length===0) console.error('GDELT: 0 headlines — API may be rate-limited or unreachable');
  console.groupEnd();
  
  return{fredData, headlines:allHeadlines, fredAvailable, headlineCount:allHeadlines.length};
}

async function mapTickerToSector(ticker, companyName){
  if(!ticker)return null;

  // Check in-memory cache
  if(APP.sectorMappingCache[ticker])return APP.sectorMappingCache[ticker];

  // Check Supabase cache (90-day TTL)
  const cached=await supa.getSectorMapping(ticker);
  if(cached){
    const age=(Date.now()-new Date(cached.cached_at).getTime())/86400000;
    if(age<90){APP.sectorMappingCache[ticker]=cached.sector;return cached.sector}
  }

  // Try FMP — skip immediately if already confirmed unavailable this session.
  // The server /api/fmp/* route returns 410 Gone (free tier dropped Aug 2025).
  // Any non-ok response (403, 410, 5xx) permanently disables FMP for this session
  // so we don't waste 60 roundtrips that all fail identically.
  if(FMP_AVAILABLE){
    try{
      const r=await fetch(`/api/fmp/stable/profile?symbol=${ticker}`,{signal:fetchSignal(6000)});
      if(!r.ok){
        FMP_AVAILABLE=false;
        console.warn(`FMP: ${r.status} — disabling for this session, routing all sector mapping to Claude fallback.`);
        return null;
      }
      if(r.ok){
        const data=await r.json();
        const sector=data?.[0]?.sector||null;
        const industry=data?.[0]?.industry||null;
        if(sector){
          const normalized=normalizeSectorName(sector);
          APP.sectorMappingCache[ticker]=normalized;
          await supa.saveSectorMapping(ticker,normalized,industry);
          return normalized;
        }
      }
    }catch(e){/* FMP unavailable */}
  }

  return null; // Handled by Claude batch classification below
}

// Scores each fund's management quality 1–10 using Claude's knowledge of:

async function fetchManagerScores(funds){
  const now=new Date().toISOString();

  const needed=[];

  // Check in-memory cache first, then Supabase
  for(const f of funds){

      if(age<TTL_DAYS)continue;
    }
    // Try Supabase cache
    try{
      const cached=await supa.getManagerScore(f.ticker);
      if(cached){
        const age=(Date.now()-new Date(cached.cached_at).getTime())/86400000;

For each fund below, score the management quality 1–10 and provide a one-sentence reason.

Known alerts for some funds (treat as confirmed negative signals):
${alertContext||'(none)'}

Funds to score (ticker|name):
${fundList}

Return ONLY valid JSON — no markdown:
{"scores":{"TICKER":{"score":N,"reasoning":"one sentence"},...}}`;

  try{
    const res=await fetch('/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':'','anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){console.warn('Manager scoring Claude call failed:',res.status);return;}
    const data=await res.json();
    const text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const jsonMatch=clean.match(/\{[\s\S]*\}/);
    if(!jsonMatch)return;

    // Fall back to neutral for all needed funds
    needed.forEach(f=>{APP.managerScores[f.ticker]={score:5,reasoning:'Assessment unavailable',cachedAt:now}});
  }
}
async function scoreHoldingsAndRollup(fundsWithHoldings, sectorScores, tiingoData, sectorMomentum, weights, setDetail){
  // Auto-normalize weights to sum to 1.0 — protects composite formula
  // if user has weights that don't sum to 100.
  const rawW=weights||DEFAULT_WEIGHTS;
  const wTotal=Object.values(rawW).reduce((s,v)=>s+v,0);
  const W=wTotal>0
    ? Object.fromEntries(Object.entries(rawW).map(([k,v])=>[k,v/wTotal]))
    : {worldThesis:0.35,momentum:0.20,riskAdj:0.15,managerQuality:0.15,holdingsCoverage:0.15};

  const results=[];
  const pl=setDetail||(()=>{}); // pipeline detail callback — safe no-op if not provided

  // ── Step A: Map all holdings to sectors (FMP + Claude fallback) ──
  // Deduplicate: only process tickers not already in the in-memory cache
  const allHoldings=[];
  const seen=new Set();
  fundsWithHoldings.forEach(f=>{
    (f.holdings||[]).forEach(h=>{
      if(h.ticker&&!APP.sectorMappingCache[h.ticker]&&!seen.has(h.ticker)){
        seen.add(h.ticker);
        allHoldings.push(h);
      }
    });
  });

  // FMP: cap at 60 to respect 250 req/day free tier; log skipped count clearly
  const toFMP=allHoldings.slice(0,60);
  const skippedFMP=allHoldings.length-toFMP.length;
  if(skippedFMP>0) console.warn(`FMP sector mapping: skipping ${skippedFMP} tickers (daily limit — will use Claude fallback)`);
  for(let i=0;i<toFMP.length;i++){
    pl(`Step 5A: Sector mapping via FMP (${i+1}/${toFMP.length})...`);
    await mapTickerToSector(toFMP[i].ticker, toFMP[i].name);
    await sleep(80);
  }

  // Claude fallback for any still-unmapped (includes skipped FMP tickers)
  const stillUnmapped=allHoldings.filter(h=>!APP.sectorMappingCache[h.ticker]);
  if(stillUnmapped.length){
    pl(`Step 5A: Claude classifying ${stillUnmapped.length} unmapped tickers...`);
    const clsResult=await classifyUnknownSectors(stillUnmapped);
    Object.entries(clsResult).forEach(([key,sector])=>{APP.sectorMappingCache[key]=sector});
    console.log(`Claude sector fallback: classified ${Object.keys(clsResult).length} tickers`);
  }

  // ── Step B: Score each fund via sector-weighted holdings rollup ──
  // NOTE: individual holding Tiingo calls removed — they caused 10+ minute hangs
  // (144 sequential calls × ~400ms each). Fund-level momentum from Step 2 and
  // sector ETF momentum provide equivalent signal without the latency.
  for(let fi=0;fi<fundsWithHoldings.length;fi++){
    const fund=fundsWithHoldings[fi];
    pl(`Step 5B: Scoring ${fund.ticker} (${fi+1}/${fundsWithHoldings.length})...`);

    const holdings=fund.holdings||[];
    const td=tiingoData[fund.ticker]||null;

    if(!holdings.length){
      // No holdings — fall back to seed scores + Tiingo where available.
      // holdingsCoverage = 0 for no-holdings funds (penalizes them appropriately).
      const seed=SEED[fund.ticker]||{macro:5,momentum:5,riskAdj:5,roi:0};
      const momentum=td?.momentum||seed.momentum||5;
      const riskAdj=td?.riskAdj||seed.riskAdj||5;
      const worldThesisScore=seed.macro||5;
      const managerQuality=APP.managerScores[fund.ticker]?.score||5;
      const holdingsCoverage=0; // No holdings data at all
      const roi=predictROI(worldThesisScore,momentum,riskAdj);
      results.push({
        ticker:fund.ticker,name:fund.name,
        composite:5,roi,
        worldThesisScore,momentum,riskAdj,managerQuality,holdingsCoverage,
        nav:td?.nav||null,
        sectorBreakdown:{},sectorScore:worldThesisScore,
        alert:ALERTS[fund.ticker]||null,holdings:null,
        modZ:0,tier:null,
        _concentrationPenalty:0,
      });
      continue;
    }

    // Map holdings to sectors and compute sector exposure %
    const sectorExposure={};
    let totalMapped=0;
    holdings.forEach(h=>{
      const sector=APP.sectorMappingCache[h.ticker]||APP.sectorMappingCache[h.name]||h.sector||null;
      if(sector&&GICS_SECTORS[sector]){
        sectorExposure[sector]=(sectorExposure[sector]||0)+h.pctVal;
        totalMapped+=h.pctVal;
      }
    });

    // Holdings Coverage Score — what % of this fund's value do we have sector data for?
    // Scaled 0–10. A fund with 80% mapped = 8.0. Unmapped weight defaults to neutral (5.0)
    // in the thesis score, so low coverage both reduces worldThesis accuracy AND
    // contributes a lower holdingsCoverage score to the composite. Honest double signal.
    const holdingsCoverage=Math.min(10, (totalMapped/100)*10);

    // World-thesis score: holdings-weighted average of sector scores
    let worldThesisScore=5.0;
    if(totalMapped>5&&sectorScores){
      let wSum=0,wTot=0;
      Object.entries(sectorExposure).forEach(([sector,pct])=>{
        const ss=sectorScores[sector];
        if(ss){wSum+=ss.score*(pct/100);wTot+=pct/100}
      });
      const unmappedFrac=Math.max(0,(100-totalMapped)/100);
      worldThesisScore=wTot>0?(wSum+5.0*unmappedFrac)/(wTot+unmappedFrac):5.0;
    }

    // HHI concentration penalty (penalises funds over-concentrated in one sector)
    const hhi=Object.values(sectorExposure).reduce((s,v)=>s+(v/100)*(v/100),0);
    const concentrationPenalty=Math.max(0,(hhi-0.18)*1.5);

    // Momentum: fund-level Tiingo (already fetched in Step 2)
    const fundMomentum=td?.momentum||5;
    const riskAdj=td?.riskAdj||5;

    // Sector-weighted momentum from Step 2 ETF data (40% blend)
    let sectorMomSum=0,sectorMomWt=0;
    Object.entries(sectorExposure).forEach(([sector,pct])=>{
      const sm=sectorMomentum?.[sector]?.momentum;
      if(sm!=null){sectorMomSum+=sm*(pct/100);sectorMomWt+=pct/100}
    });
    const sectorBlendedMom=sectorMomWt>0?sectorMomSum/sectorMomWt:fundMomentum;
    const blendedMomentum=fundMomentum*0.6+sectorBlendedMom*0.4;

    // Manager quality from background Promise (Claude-assessed, 30-day cache)
    const managerQuality=APP.managerScores[fund.ticker]?.score||5;

    const roi=predictROI(worldThesisScore,blendedMomentum,riskAdj);

    results.push({
      ticker:fund.ticker,name:fund.name,
      composite:5,roi:+roi.toFixed(2),
      worldThesisScore:+worldThesisScore.toFixed(2),
      momentum:+blendedMomentum.toFixed(2),riskAdj:+riskAdj.toFixed(2),
      managerQuality:+managerQuality.toFixed(1),
      holdingsCoverage:+holdingsCoverage.toFixed(2),
      nav:td?.nav||null,
      sectorBreakdown:sectorExposure,sectorScore:+worldThesisScore.toFixed(2),
      alert:ALERTS[fund.ticker]||null,
      holdings:fund.holdings,
      modZ:0,tier:null,
      _concentrationPenalty:concentrationPenalty,
    });
  }

  // ── Final pass: compute composite using all 5 factors ──
  // W is already normalized to sum to 1.0 (done at top of function).
  // All five factors now carry independent signal — no constants, no double-counting.
  results.forEach(f=>{
    const penalty=f._concentrationPenalty||0;
    delete f._concentrationPenalty;
    f.composite=+Math.min(10,Math.max(1,
      f.worldThesisScore * W.worldThesis +
      f.momentum        * W.momentum +
      f.riskAdj         * W.riskAdj +
      f.managerQuality  * W.managerQuality +
      f.holdingsCoverage* W.holdingsCoverage
    - penalty)).toFixed(2);
  });

  console.log(`Step 5 complete: scored ${results.length} funds`);
  return results;
}

function predictROI(worldScore,momentum,riskAdj){
  // World thesis score maps to ROI: score 10=+8%, score 5=0%, score 1=-6%
  const thesisROI=(worldScore-5)*1.6;
  const momentumROI=(momentum-5)*0.8;
  const riskROI=(riskAdj-5)*0.4;
  return+(thesisROI*0.55+momentumROI*0.30+riskROI*0.15).toFixed(2);
}

// ═══════════════════════════════════════════════════════════════
// STATISTICAL OUTLIER DETECTION — Modified Z-Score
// ═══════════════════════════════════════════════════════════════
function applyStatisticalAnalysis(funds){
  const scores=funds.map(f=>f.composite);
  
  // Median
  const sorted=[...scores].sort((a,b)=>a-b);
  const n=sorted.length;
  const median=n%2===0?(sorted[n/2-1]+sorted[n/2])/2:sorted[Math.floor(n/2)];
  
  // MAD (Median Absolute Deviation)
  const deviations=scores.map(s=>Math.abs(s-median));
  const devSorted=[...deviations].sort((a,b)=>a-b);
  const mad=n%2===0?(devSorted[n/2-1]+devSorted[n/2])/2:devSorted[Math.floor(n/2)];
  
  return funds.map(f=>{
    const modZ=mad>0?+(0.6745*(f.composite-median)/mad).toFixed(3):0;
    const tier=getTierFromModZ(modZ);
    return{...f,modZ,tier,median,mad};
  }).sort((a,b)=>b.composite-a.composite);
}

function getTierFromModZ(modZ){
  if(modZ>=2.0) return{label:'BREAKAWAY',cls:'t1',emoji:'🏆',color:'var(--green)',desc:'Statistically exceptional — significantly above peer group'};
  if(modZ>=1.2) return{label:'STRONG',cls:'t1',emoji:'⭐',color:'var(--green)',desc:'Strong performer — meaningfully above average'};
  if(modZ>=0.3) return{label:'SOLID',cls:'t2',emoji:'✓',color:'var(--amber)',desc:'Above average — solid choice for current environment'};
  if(modZ>=-0.5)return{label:'NEUTRAL',cls:'t3',emoji:'→',color:'var(--blue)',desc:'In line with peer average'};
  return{label:'WEAK',cls:'t4',emoji:'⚠',color:'var(--red)',desc:'Below average for current conditions'};
}

function getTierLabel(score){return getTierFromModZ(score>=7?2:score>=5?0.5:score>=3?-0.3:-1)}

// ═══════════════════════════════════════════════════════════════
// ALLOCATION ENGINE — Risk tolerance aware (1–9 scale)
// ═══════════════════════════════════════════════════════════════
function buildAllocation(rankedFunds, riskTolerance){
  const rt=riskTolerance||5;
  
  // Risk tolerance controls:
  // 1-2: Only SOLID+ tier, max volatility cutoff, spread across ≥6 funds
  // 3-4: SOLID+ tier, moderate concentration, ≥4 funds
  // 5:   Balanced — SOLID+ tier, ≤5 funds
  // 6-7: STRONG+ preferred, some concentration allowed
  // 8-9: BREAKAWAY+STRONG focused, concentrate in top outliers, risk-tolerant

  const eligible=rankedFunds.filter(f=>{
    if(rt<=3)return f.modZ>=-0.3&&f.riskAdj>=4.5; // conservative: require decent Sharpe
    if(rt<=5)return f.modZ>=0.1;                   // moderate: above median
    if(rt<=7)return f.modZ>=0.3||f.composite>=6;   // leaning aggressive
    return f.modZ>=0.5||f.composite>=5.5;           // aggressive: any strong+ fund
  });
  
  if(!eligible.length)return[];
  
  // How many funds to include
  let maxFunds;
  if(rt<=2) maxFunds=Math.min(8,eligible.length);
  else if(rt<=4) maxFunds=Math.min(6,eligible.length);
  else if(rt<=6) maxFunds=Math.min(5,eligible.length);
  else maxFunds=Math.min(3,eligible.length); // concentrate in top picks
  
  const selected=eligible.slice(0,maxFunds);
  
  // Allocation proportional to composite score, with risk-tolerance skew
  // Higher risk = more concentration toward top funds
  const concentrationPower=0.5+rt*0.15; // rt=1 → pow=0.65 (even), rt=9 → pow=1.85 (concentrated)
  const rawAllocs=selected.map(f=>Math.pow(f.composite,concentrationPower));
  const total=rawAllocs.reduce((s,v)=>s+v,0);
  
  return selected.map((f,i)=>({
    ...f,
    allocationPct:+(rawAllocs[i]/total*100).toFixed(1),
  }));
}

// ═══════════════════════════════════════════════════════════════
async function generateInvestorThesis(rankedFunds, sectorScores, investmentThesis, allocationResult, riskTolerance){
  const rt=riskTolerance||5;
  const rtLabel=rt<=2?'very conservative':rt<=4?'conservative-moderate':rt<=6?'balanced':rt<=7?'growth-oriented':'aggressive';
  
  const topFunds=allocationResult.slice(0,5).map(f=>`${f.ticker} (${f.allocationPct}%): ${f.name} — composite ${f.composite}, pred ROI ${f.roi>0?'+':''}${f.roi}%`).join('\n');
  const avoidFunds=rankedFunds.filter(f=>f.tier.label==='WEAK').map(f=>f.ticker).join(', ')||'none';
  
  const sectorWinners=Object.entries(sectorScores||{}).filter(([,v])=>v.score>=7).map(([k,v])=>`${k} (${v.score}/10): ${v.reason}`).join('\n')||'No strong sector winners identified';
  const sectorLosers=Object.entries(sectorScores||{}).filter(([,v])=>v.score<=4).map(([k,v])=>`${k} (${v.score}/10): ${v.reason}`).join('\n')||'No major sector losers identified';
  
  const prompt=`You are writing a plain-English investment recommendation for a self-directed 401K investor with a ${rtLabel} risk profile (${rt}/9).

CURRENT INVESTMENT THESIS:
${investmentThesis?.thesis||'Market conditions uncertain — see sector scores'}

DOMINANT THEME: ${investmentThesis?.dominantTheme||'Mixed signals'}

RECOMMENDED ALLOCATION:
${topFunds}

FUNDS TO AVOID: ${avoidFunds}

SECTOR WINNERS (score ≥7/10):
${sectorWinners}

SECTOR LOSERS (score ≤4/10):
${sectorLosers}

RISK FACTORS: ${(investmentThesis?.riskFactors||[]).join(', ')}
CATALYSTS: ${(investmentThesis?.catalysts||[]).join(', ')}

Write a 400-word investor letter in plain English. The tone should match the risk profile: ${rtLabel}. 
Structure: (1) What's happening in the world right now that matters for this portfolio, (2) Why these specific funds are recommended — what do the companies inside them DO that positions them well, (3) What to watch out for, (4) Clear statement of the recommendation.
Use "you" and "your portfolio". Short sentences. No jargon without explanation. Readable grade 7-8.
Return ONLY the letter text, no JSON.`;

  try{
    const res=await fetch('/api/claude',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':'','anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:700,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok)return null;
    const data=await res.json();
    return(data.content||[]).find(b=>b.type==='text')?.text||null;
  }catch(e){return null}
}

async function storePredictions(rankedFunds, worldData, investmentThesis, allocationResult){
  const prof=activeProfile();
  if(!prof)return null;
  
  const cycleId=crypto.randomUUID?crypto.randomUUID():`cycle_${Date.now()}`;
  const now=new Date().toISOString();
  const closesAt=new Date(Date.now()+90*86400000).toISOString();
  
  // Save prediction cycle
  const cycleResult=await supa.savePredictionCycle({
    id:cycleId,
    user_id:prof.id,
    created_at:now,
    closes_at:closesAt,
    world_data_snapshot:JSON.stringify({fredData:worldData?.fredData,headlines:worldData?.headlines?.slice(0,10)}),
    investment_thesis:investmentThesis?.thesis||null,
    dominant_theme:investmentThesis?.dominantTheme||null,
    risk_factors:investmentThesis?.riskFactors||[],
    catalysts:investmentThesis?.catalysts||[],
    sector_scores:JSON.stringify(APP.sectorScores||{}),
    risk_level:prof.risk||5,
    factor_weights:JSON.stringify(getWeights()),
    lens_active:APP.applyLens&&(prof.marketLens||[]).length>0,
    lens_keywords:APP.applyLens&&(prof.marketLens||[]).length>0?(prof.marketLens||[]):null,
  });
  
  if(!cycleResult){console.error('savePredictionCycle FAILED — check Supabase table schema and RLS policies');}
  // Save individual fund predictions (rankedFunds is already sorted by composite desc,
  // so index+1 is the predicted rank for this cycle)
  const predictions=rankedFunds.map((f,idx)=>({
    cycle_id:cycleId,
    user_id:prof.id,
    fund_ticker:f.ticker,
    fund_name:f.name||f.ticker,
    composite_score:f.composite,
    predicted_roi_90d:f.roi,
    predicted_tier:f.tier?.label||'NEUTRAL',
    predicted_rank:idx+1,
    nav_at_prediction:f.nav||null,
    nav_at_close:null,
    roi_actual:null,
    factor_scores:JSON.stringify({
      worldThesis:f.worldThesisScore,momentum:f.momentum,riskAdj:f.riskAdj,
      managerQuality:f.managerQuality,holdingsCoverage:f.holdingsCoverage,
      sectorBreakdown:f.sectorBreakdown||{},
    }),
    allocation_pct:allocationResult.find(a=>a.ticker===f.ticker)?.allocationPct||0,
    created_at:now,
  }));
  await supa.saveFundPredictions(predictions);
  
  return cycleId;
}

// Check for prediction cycles that have closed (>90 days) and fetch actual prices
async function checkAndUpdateClosedPredictions(){
  const prof=activeProfile();
  if(!prof)return;
  
  try{
    const cycles=await supa.getPredictionCycles(prof.id,20);
    if(!cycles?.length)return;
    
    const now=Date.now();
    for(const cycle of cycles){
      const closesAt=new Date(cycle.closes_at).getTime();
      if(closesAt>now)continue; // not closed yet
      
      // Get predictions for this cycle
      const preds=await supa.getFundPredictions(cycle.id);
      if(!preds?.length)continue;
      
      const needsActual=preds.filter(p=>p.roi_actual===null&&p.nav_at_prediction!==null);
      if(!needsActual.length)continue;
      
      for(const pred of needsActual){
        const d=await fetchTiingo(pred.fund_ticker);
        if(d?.nav&&pred.nav_at_prediction){
          const actualRoi=((d.nav-pred.nav_at_prediction)/pred.nav_at_prediction)*100;
          await supa.updateFundPrediction(pred.id,{nav_at_close:d.nav,roi_actual:+actualRoi.toFixed(3)});
        }
        await sleep(300);
      }
    }
  }catch(e){console.warn('Prediction update check failed:',e.message)}
}

// ═══════════════════════════════════════════════════════════════
// MAIN PIPELINE — 6 steps
// ═══════════════════════════════════════════════════════════════
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
// AbortSignal.timeout() can't be cloned in some browser/proxy environments.
// Use this helper instead — creates a controller, fires abort after ms.
function fetchSignal(ms){const c=new AbortController();setTimeout(()=>c.abort(),ms);return c.signal;}

async function runPipeline(){
  if(APP.loading)return;
  APP.loading=true;APP.source='loading';APP.tiingoStale=false;APP.errors=[];
  // Clear Tiingo cache each run — if market is open we want live prices,
  // if market is closed the cache will be repopulated on first fetch this session.
  if(APP.marketOpen) APP.tiingoCache={};
  const funds=getFunds();
  const weights=getWeights();
  const tiingo={};

  function setPL(step,total,stepName,detail){APP.pipeline={step,total,stepName,detail};render()}

  // ─────────────────────────────────────────────────────────────
  // BACKGROUND: Start EDGAR fetch immediately — it's fully
  // independent of world data and price signals. It runs during
  // the 45–90 seconds that steps 1–3 consume (GDELT rate limits),
  // so by the time we reach step 4 the holdings are usually ready.
  // ─────────────────────────────────────────────────────────────
  const edgarPromise = (async () => {
    const result = [];
    for(let i=0;i<funds.length;i++){
      const f=funds[i];
      // In-memory cache (from previous run this session)
      if(APP.holdingsCache[f.ticker]){result.push({...f,holdings:APP.holdingsCache[f.ticker].holdings});continue}
      // Supabase 90-day cache
      const cached=await supa.getHoldings(f.ticker);
      if(cached){
        const age=(Date.now()-new Date(cached.fetchedAt).getTime())/86400000;
        if(age<90){APP.holdingsCache[f.ticker]=cached;result.push({...f,holdings:cached.holdings});continue}
      }
      // Money market funds file N-MFP, not N-PORT-P — no holdings to fetch
      if(MONEY_MARKET_FUNDS.has(f.ticker)){result.push({...f,holdings:null});continue}
      // Live SEC EDGAR fetch
      const holdings=await fetchEdgarHoldings(f.ticker,f.name);
      if(holdings?.length){
        APP.holdingsCache[f.ticker]={holdings,fetchedAt:new Date().toISOString()};
        result.push({...f,holdings});
        await supa.saveHoldings(f.ticker,holdings,f.name);
      }else{
        result.push({...f,holdings:null});
      }
      await sleep(300); // respect SEC rate limit
    }
    return result;
  })();

  // ── STEP 1: World Intelligence ────────────────────────────────
  // Always first: understand the macro environment before anything else.
  // FRED 11 series fetched in parallel (~1s). GDELT 4 adaptive queries
  // sequential (server enforces 5s between calls — ~25s total).
  setPL(1,6,'STEP 1 / 6','Building world intelligence: FRED economic data + GDELT geopolitical news...');
  const worldData=await buildWorldIntelligence(detail=>{setPL(1,6,'STEP 1 / 6',detail);});
  APP.worldData=worldData;

  // ── STEP 2: Tiingo NAV + Sector ETF Momentum ─────────────────
  // Fund NAV, 63-day momentum, and Sharpe ratio from Tiingo daily prices.
  // Sector ETFs (XLK, XLF…) fetched separately for the sector momentum
  // blend in holdings rollup (40% weight). Sequential with 200ms delay
  // to stay within Tiingo's rate limit.
  setPL(2,6,'STEP 2 / 6','Fetching fund prices, momentum & Sharpe ratios from Tiingo...');
  for(let i=0;i<funds.length;i++){
    setPL(2,6,'STEP 2 / 6',`Tiingo prices: ${funds[i].ticker} (${i+1}/${funds.length})`);
    const d=await fetchTiingo(funds[i].ticker);
    if(d)tiingo[funds[i].ticker]=d;
    await sleep(200);
  }
  setPL(2,6,'STEP 2 / 6','Fetching sector ETF momentum (XLK, XLF, XLE, XLV...)');
  const sectorMomentum=await fetchSectorMomentum();

  // ── STEP 3: Strategy Formation ────────────────────────────────
  // Claude Haiku now has all the information it needs: FRED macro data,
  // GDELT headlines, and sector ETF momentum. It forms a complete
  // investment thesis and scores all 11 GICS sectors 1–10.
  // 3 retry attempts with 12s backoff + 1 clean final fallback.
  setPL(3,6,'STEP 3 / 6','Forming investment strategy: Claude scoring all 11 GICS sectors...');
  const sectorResult=await scoreSectorsWithClaude(worldData,sectorMomentum);
  if(sectorResult){
    APP.sectorScores=sectorResult.sectorScores;
    APP.investmentThesis=sectorResult;
    APP.dominantTheme=sectorResult.dominantTheme;
  }else{
    APP.errors.push('Sector scoring failed — Claude returned no valid JSON. Scores will use seed data.');
    console.error('STEP 3: scoreSectorsWithClaude returned null — all attempts failed');  }

  // ── STEP 4: EDGAR Holdings ────────────────────────────────────
  // Await the background fetch started at t=0. In most cases this is
  // already complete (it ran during the 45–90s of steps 1–3).
  // Shows "Awaiting..." if there's still a live EDGAR fetch in progress.
  setPL(4,6,'STEP 4 / 6','Loading fund holdings from SEC EDGAR...');
  const fundsWithHoldings=await edgarPromise;
  const holdingsLoaded=fundsWithHoldings.filter(f=>f.holdings?.length).length;
  console.log(`EDGAR: ${holdingsLoaded}/${funds.length} funds with holdings loaded`);

  // ── STEP 5: Holdings-Level Scoring + Fund Rollup ─────────────
  // For each fund: map holdings to sectors → weighted avg sector score.
  // HHI concentration penalty applied to single-sector-heavy funds.
  // Momentum: 60% fund NAV (Tiingo) + 40% sector ETF (blended).
  // Modified Z-score detects statistical outliers in the final ranking.
  setPL(5,6,'STEP 5 / 6','Scoring each fund by holdings × strategy...');
  let rankedFunds=await scoreHoldingsAndRollup(fundsWithHoldings,APP.sectorScores,tiingo,sectorMomentum,weights,detail=>{setPL(5,6,'STEP 5 / 6',detail);});
  rankedFunds=applyStatisticalAnalysis(rankedFunds);
  APP.funds=rankedFunds;

  // ── STEP 6: Allocation + Investor Thesis ─────────────────────
  // buildAllocation: score-proportional, concentration skewed by risk tolerance
  //   (concentrationPower = 0.5 + rt*0.15: rt=1 spreads evenly, rt=9 concentrates)
  // generateInvestorThesis: 400-word plain-English recommendation from Claude
  // storePredictions: saves cycle to Supabase for 90-day predicted vs actual tracking
  setPL(6,6,'STEP 6 / 6','Generating allocation recommendation and investor thesis...');
  const prof=activeProfile();
  const riskTolerance=prof?.risk||5;
  const allocationResult=buildAllocation(rankedFunds,riskTolerance);
  APP.allocationResult=allocationResult;

  const investorLetter=await generateInvestorThesis(rankedFunds,APP.sectorScores,APP.investmentThesis,allocationResult,riskTolerance);
  APP.investorLetter=investorLetter;

  // Store predictions for 90-day tracking (prediction_cycles + fund_predictions tables)
  APP.currentCycleId=await storePredictions(rankedFunds,worldData,APP.investmentThesis,allocationResult);
  
  // Assess data quality — drives staleness warning in UI
  const fredOk=(worldData?.fredAvailable||0)>=4;
  const gdeltOk=(worldData?.headlineCount||0)>=6;
  let staleness='live';
  if(!fredOk&&!gdeltOk) staleness='stale';
  else if(!fredOk||!gdeltOk) staleness='partial';
  APP.dataQuality={
    fredOk, gdeltOk,
    fredSeriesCount:worldData?.fredAvailable||0,
    fredSeriesTotal:Object.keys(FRED_SERIES).length,
    headlineCount:worldData?.headlineCount||0,
    staleness,  // 'live' | 'partial' | 'stale'
    assessedAt:new Date().toLocaleString(),
  };

  APP.source=APP.sectorScores?'live':'partial';
  APP.lastRun=new Date().toLocaleString();
  APP.selectedFund=rankedFunds[0]?.ticker;
  APP.loading=false;
  APP.pipeline={step:0,total:6,detail:'',stepName:''};
  render();
}

// DATA QUALITY WARNING BANNER

function renderDataQualityWarning(){
  const tiingoBanner=APP.tiingoStale?`<div style="background:#EFF6FF;border-bottom:1px solid #BFDBFE;padding:8px 24px;display:flex;align-items:center;gap:10px">
    <span style="font-size:13px">📦</span>
    <div style="font-size:12px;color:#1D4ED8"><b>Tiingo: using yesterday's cached prices</b> — hourly limit reached. Momentum & Sharpe scores are from the previous session. Scores are still valid; refresh tomorrow for live prices.</div>
  </div>`:'';
  
  // Surface any pipeline errors in the UI
  const errorBanner=APP.errors?.length?`<div style="background:var(--red-bg);border-bottom:1px solid var(--red-bd);padding:8px 24px;display:flex;align-items:flex-start;gap:10px">
    <span style="font-size:13px;flex-shrink:0">⚠️</span>
    <div>${APP.errors.map(e=>`<div style="font-size:12px;color:var(--red);font-weight:600">${e}</div>`).join('')}</div>
  </div>`:'';
  
  const dq=APP.dataQuality;
  if(!dq||dq.staleness==='live')return tiingoBanner+errorBanner;

  if(dq.staleness==='stale'){
    return tiingoBanner+errorBanner+`<div style="background:var(--red-bg);border-bottom:2px solid var(--red-bd);padding:9px 24px;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap">
      <span style="font-size:14px;flex-shrink:0">⚠️</span>
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:2px">Macro data unavailable — scores reflect AI training knowledge, not live market conditions</div>
        <div style="font-size:11px;color:var(--red);line-height:1.6">
          FRED returned ${dq.fredSeriesCount}/${dq.fredSeriesTotal} economic series and GDELT returned ${dq.headlineCount} headlines — not enough to ground the thesis in current data.
          Claude is scoring sectors from its training knowledge, which has a cutoff date and may be months out of date.
          <b>Do not act on these scores.</b> Check that FRED_KEY is set correctly in Railway, then run again to restore live data.
        </div>
      </div>
    </div>`;
  }

  // partial — some data came through, some did not
  const missing=[];
  if(!dq.fredOk)missing.push(`FRED economic data (${dq.fredSeriesCount}/${dq.fredSeriesTotal} series fetched — check FRED_KEY in Railway)`);
  if(!dq.gdeltOk)missing.push(`GDELT geopolitical news (${dq.headlineCount} headlines — GDELT may be temporarily rate-limited)`);
  return tiingoBanner+errorBanner+`<div style="background:var(--amber-bg);border-bottom:1px solid var(--amber-bd);padding:8px 24px;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap">
    <span style="font-size:13px;flex-shrink:0">◑</span>
    <div>
      <div style="font-size:12px;font-weight:700;color:var(--amber);margin-bottom:2px">Partial live data — sector thesis may be less precise than usual</div>
      <div style="font-size:11px;color:var(--amber);line-height:1.6">
        ${missing.join(' · ')}.
        Claude scored sectors from its training knowledge to fill the gaps.
        Scores are directionally useful but not fully grounded in real-time data. Consider re-running once the data source recovers.
      </div>
    </div>
  </div>`;
}

function riskLabel(rt){
  if(rt<=1)return'Very Conservative';if(rt<=3)return'Conservative';
  if(rt<=4)return'Moderate-Conservative';if(rt===5)return'Balanced';
  if(rt<=6)return'Moderate-Aggressive';if(rt<=7)return'Growth';
  if(rt<=8)return'Aggressive';return'Very Aggressive';
}
function riskDescription(rt){
  if(rt<=2)return'You prioritize protecting your money above all else. FundLens will recommend stable, low-volatility funds that aim to beat inflation without significant risk of loss.';
  if(rt<=4)return'You want steady growth while limiting downside risk. FundLens will balance return potential with stability, avoiding the most volatile funds.';
  if(rt===5)return'You want a true balance between growth and protection. FundLens will recommend a diversified allocation across both stable and higher-growth funds.';
  if(rt<=7)return'You lean toward growth and are comfortable with some volatility in exchange for stronger potential returns. FundLens will concentrate allocation in the top-performing opportunities.';
  return'You prioritize maximum growth and accept the possibility of significant short-term losses. FundLens will aggressively concentrate your allocation in the statistical outliers with the highest predicted ROI.';
}

function buildRadarSVG(fund,dims,color,cx,cy,r){
  const N=dims.length,rd=d=>d*Math.PI/180;let svg='';
  [0.25,0.5,0.75,1].forEach(p=>{
    const pts=dims.map((_,i)=>{const a=-90+i*(360/N);return`${cx+r*p*Math.cos(rd(a))},${cy+r*p*Math.sin(rd(a))}`}).join(' ');
    svg+=`<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  });
  dims.forEach((d,i)=>{
    const a=-90+i*(360/N);
    const ax=cx+r*Math.cos(rd(a)),ay=cy+r*Math.sin(rd(a));
    const lx=cx+(r+18)*Math.cos(rd(a)),ly=cy+(r+18)*Math.sin(rd(a));
    svg+=`<line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="var(--border)" stroke-width="1"/>`;
    svg+=`<text x="${lx}" y="${ly}" fill="var(--text3)" font-size="9" font-family="Manrope,sans-serif" text-anchor="middle" dominant-baseline="middle">${d.label}</text>`;
  });
  const pts=dims.map((d,i)=>{const a=-90+i*(360/N);const v=Math.min(fund[d.key]||0,10)/10;return`${cx+r*v*Math.cos(rd(a))},${cy+r*v*Math.sin(rd(a))}`}).join(' ');
  svg+=`<polygon points="${pts}" fill="${color}" fill-opacity="0.12" stroke="${color}" stroke-width="1.5"/>`;
  return svg;
}

function buildDonutSVG(items,ak,cx,cy,r,inn,lk,cfn,cl){
  let a=-90,o='';
  items.forEach((it,i)=>{
    const p=it[ak]/100,sa=a,ea=a+p*360,rd=d=>d*Math.PI/180;
    const sx=cx+r*Math.cos(rd(sa)),sy=cy+r*Math.sin(rd(sa));
    const ex=cx+r*Math.cos(rd(ea)),ey=cy+r*Math.sin(rd(ea));
    const ix=cx+inn*Math.cos(rd(ea)),iy=cy+inn*Math.sin(rd(ea));
    const jx=cx+inn*Math.cos(rd(sa)),jy=cy+inn*Math.sin(rd(sa));
    const la=p>0.5?1:0;
    const d=`M${sx} ${sy} A${r} ${r} 0 ${la} 1 ${ex} ${ey} L${ix} ${iy} A${inn} ${inn} 0 ${la} 0 ${jx} ${jy}Z`;
    const mid=sa+p*180,lx=cx+(r+14)*Math.cos(rd(mid)),ly=cy+(r+14)*Math.sin(rd(mid));
    const col=cfn(i);
    o+=`<path d="${d}" fill="${col}" opacity="0.85" stroke="white" stroke-width="2"/>`;
    if(p>0.05)o+=`<text x="${lx}" y="${ly}" fill="${col}" font-size="8" font-family="JetBrains Mono,monospace" font-weight="700" text-anchor="middle" dominant-baseline="middle">${it[lk]}</text>`;
    a=ea;
  });
  o+=`<circle cx="${cx}" cy="${cy}" r="${inn-3}" fill="white"/>`;
  cl.forEach((ln,i)=>o+=`<text x="${cx}" y="${cy+(i-cl.length/2+0.6)*14}" text-anchor="middle" fill="${ln.c}" font-size="${ln.sz||10}" font-family="Manrope,sans-serif" font-weight="${ln.w||400}">${ln.t}</text>`);
  return o;
}

// HISTORY TAB — Predicted vs Actual ROI tracking
// ═══════════════════════════════════════════════════════════════
async function renderHistory(){
  const prof=activeProfile();
  if(!prof)return'<div style="padding:40px;text-align:center;color:var(--text3)">No profile active.</div>';
  
  const cycles=await supa.getPredictionCycles(prof.id,12);
  if(!cycles?.length)return`<div style="padding:48px;text-align:center;color:var(--text3)">
    <div style="font-size:32px;margin-bottom:12px">📅</div>
    <div style="font-size:14px;font-weight:600;color:var(--text2)">No prediction history yet</div>
    <p style="font-size:12px;margin-top:8px;line-height:1.6">Each time you run an analysis, FundLens records its predictions here. After 90 days, actual prices are fetched automatically to measure how accurately the model identified the right stocks for that moment.</p>
  </div>`;
  
  // Calculate information coefficient across closed cycles
  const closedCycles=cycles.filter(c=>new Date(c.closes_at)<new Date());
  
  const cards=await Promise.all(cycles.map(async cycle=>{
    const preds=await supa.getFundPredictions(cycle.id);
    const date=new Date(cycle.created_at);
    const isClosed=new Date(cycle.closes_at)<new Date();
    const daysLeft=isClosed?0:Math.ceil((new Date(cycle.closes_at)-new Date())/86400000);
    
    // Top 3 predicted
    const top3=(preds||[]).sort((a,b)=>b.composite_score-a.composite_score).slice(0,3);
    
    // Accuracy metrics (if closed)
    let accuracyHtml='';
    if(isClosed&&preds?.some(p=>p.roi_actual!==null)){
      const closed=preds.filter(p=>p.roi_actual!==null);
      const mae=closed.reduce((s,p)=>s+Math.abs(p.predicted_roi_90d-p.roi_actual),0)/closed.length;
      const directional=closed.filter(p=>(p.predicted_roi_90d>=0)===(p.roi_actual>=0)).length/closed.length;
      
      // Spearman IC (simplified rank correlation)
      const n=closed.length;
      let ic=null;
      if(n>=4){
        const predRanks=rankArray(closed.map(p=>p.predicted_roi_90d));
        const actualRanks=rankArray(closed.map(p=>p.roi_actual));
        const d2=predRanks.reduce((s,pr,i)=>s+Math.pow(pr-actualRanks[i],2),0);
        ic=+(1-(6*d2)/(n*(n*n-1))).toFixed(3);
      }
      
      const icClass=ic===null?'':ic>=0.1?'ic-good':ic>=0?'ic-ok':'ic-bad';
      accuracyHtml=`<div style="margin-top:12px;padding:10px 14px;background:var(--surface2);border-radius:7px;font-size:11px;display:flex;gap:16px;flex-wrap:wrap">
        <div><div class="label">Directional Accuracy</div><div style="font-weight:700;color:${directional>=0.6?'var(--green)':directional>=0.5?'var(--amber)':'var(--red)'}">${(directional*100).toFixed(0)}%</div></div>
        <div><div class="label">MAE (Avg Error)</div><div style="font-weight:700">${mae.toFixed(2)}pp</div></div>
        ${ic!==null?`<div><div class="label">Spearman IC</div><div class="score-md ${icClass}">${ic.toFixed(3)}</div></div>`:''}
        <div style="font-size:10px;color:var(--text3);align-self:center">${closed.length} funds with actual data · IC >0.05 = effective model</div>
      </div>`;
      
      // Show predicted vs actual for each fund
      const fundRows=closed.sort((a,b)=>b.composite_score-a.composite_score).map(p=>{
        const err=(p.roi_actual||0)-(p.predicted_roi_90d||0);
        return`<div style="display:flex;gap:12px;padding:5px 0;border-bottom:1px solid var(--bg);font-size:11px;align-items:center">
          <span style="font-family:'JetBrains Mono',monospace;font-weight:700;width:50px">${p.fund_ticker}</span>
          <span style="color:var(--text3);width:80px">pred: <b class="${(p.predicted_roi_90d||0)>=0?'pos':'neg'}">${((p.predicted_roi_90d||0)>=0?'+':'')+(p.predicted_roi_90d||0).toFixed(1)}%</b></span>
          <span style="color:var(--text3);width:80px">actual: <b class="${(p.roi_actual||0)>=0?'pos':'neg'}">${((p.roi_actual||0)>=0?'+':'')+(p.roi_actual||0).toFixed(1)}%</b></span>
          <span style="color:${Math.abs(err)<2?'var(--green)':Math.abs(err)<5?'var(--amber)':'var(--red)'}">err: ${err>=0?'+':''}${err.toFixed(1)}pp</span>
          <span class="badge ${p.predicted_tier==='BREAKAWAY'?'t1':p.predicted_tier==='STRONG'?'t1':p.predicted_tier==='SOLID'?'t2':p.predicted_tier==='NEUTRAL'?'t3':'t4'}" style="font-size:9px">${p.predicted_tier||'?'}</span>
        </div>`;
      }).join('');
      
      if(closed.length>0)accuracyHtml+=`<div style="margin-top:8px">${fundRows}</div>`;
    }
    
    return`<div class="card fade-in" style="margin-bottom:16px">
      <div class="card-header">
        <div>
          <div style="font-weight:700">${date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
          <div style="font-size:11px;color:var(--text3)">${date.toLocaleTimeString()} · ${isClosed?'Closed — accuracy computed':`${daysLeft} days until close`}</div>
        </div>

  let modelSummaryHtml='';
  if(closedCycles.length>=2){
    modelSummaryHtml=`<div class="card" style="margin-bottom:20px;background:var(--surface2)">
      <div class="card-header"><div style="font-weight:700">Model Accuracy Summary</div><div style="font-size:11px;color:var(--text3)">${closedCycles.length} closed prediction cycles</div></div>
